# ==============================================================================
# Nginx — Snippet compartido por todos los vhosts de Jaraba Impact Platform
# ==============================================================================
#
# INSTALACION:
#   cp config/deploy/nginx-jaraba-common.conf /etc/nginx/snippets/jaraba-common.conf
#
# Cada server {} block incluye este snippet via:
#   include /etc/nginx/snippets/jaraba-common.conf;
# ==============================================================================

# ── Limits ────────────────────────────────────────────────────────────────────
client_max_body_size 64M;

# ── Security Headers ─────────────────────────────────────────────────────────
# NGINX-HEADER-SSOT-001: Static file security headers.
# Dynamic responses (PHP) get headers from SecurityHeadersSubscriber.
# Nginx ONLY adds headers to static asset responses (location ~* below),
# where PHP doesn't execute and SecurityHeadersSubscriber doesn't run.
# Duplicating here causes conflicts (e.g., Permissions-Policy mismatch).
#
# Static assets get security headers via the location block below.
# PHP responses: see SecurityHeadersSubscriber (ecosistema_jaraba_core).

# ── Gzip ──────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

# ── Static Assets — Cache Largo ──────────────────────────────────────────────
location ~* \.(js|css|png|jpg|jpeg|gif|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    try_files $uri =404;
}

# ── Drupal Clean URLs ────────────────────────────────────────────────────────
location / {
    try_files $uri /index.php?$query_string;
}

# ── PHP-FPM ──────────────────────────────────────────────────────────────────
location ~ \.php$ {
    fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_param HTTP_HOST $host;
    # CSRF-LOGIN-FIX-001: Pass HTTPS status and original protocol to PHP.
    # Without these, Drupal's SessionConfiguration sees HTTP and generates
    # wrong session cookie prefix (SESS vs SSESS), breaking CSRF validation.
    fastcgi_param HTTPS $https if_not_empty;
    fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    fastcgi_intercept_errors on;
    fastcgi_pass php-fpm;
    fastcgi_read_timeout 300;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
}

# ── Bloquear acceso a archivos sensibles ─────────────────────────────────────
location ~ /\.ht {
    deny all;
}

location ~ /\.git {
    deny all;
}

location = /web.config {
    deny all;
}

# Bloquear acceso directo a .php en subdirectorios (excepto index.php).
location ~ ^/sites/.*/files/.*\.php$ {
    deny all;
}

# Bloquear update.php, install.php en produccion.
location ~ ^/(update|install)\.php {
    deny all;
}

# ── Drupal private files ─────────────────────────────────────────────────────
location ~ ^/system/files/ {
    try_files $uri /index.php?$query_string;
}

# ── Robots.txt y favicon (evitar log spam) ───────────────────────────────────
location = /robots.txt {
    allow all;
    log_not_found off;
    access_log off;
    try_files $uri /index.php?$query_string;
}

location = /favicon.ico {
    log_not_found off;
    access_log off;
}

# ── Health check endpoint ────────────────────────────────────────────────────
location = /health {
    access_log off;
    try_files $uri /index.php?$query_string;
}
