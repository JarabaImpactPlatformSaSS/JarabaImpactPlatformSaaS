# ==============================================================================
# Nginx — Upstream definition for PHP-FPM
# ==============================================================================
#
# INSTALACION:
#   cp config/deploy/nginx-upstream-php-fpm.conf /etc/nginx/conf.d/upstream-php-fpm.conf
#
# Requerido por jaraba-common.conf que usa `fastcgi_pass php-fpm;`
# El upstream DEBE definirse fuera de server {} blocks, por eso va en conf.d/.
# ==============================================================================

upstream php-fpm {
    server unix:/run/php/php8.4-fpm.sock;
}
