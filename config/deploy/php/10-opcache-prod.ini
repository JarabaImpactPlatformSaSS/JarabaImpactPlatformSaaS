; ==============================================================================
; OPcache — Production optimized for IONOS Dedicated Server
; ==============================================================================
;
; INSTALACION:
;   cp config/deploy/php/10-opcache-prod.ini /etc/php/8.4/fpm/conf.d/10-opcache.ini
;   systemctl reload php8.4-fpm
;
; IMPORTANTE: validate_timestamps=0 significa que PHP NO chequea si los
; ficheros han cambiado en disco. Tras cada deploy, el workflow ejecuta
; `systemctl reload php8.4-fpm` que invalida el cache OPcache completo.
; ==============================================================================

zend_extension=opcache.so

; Habilitar OPcache
opcache.enable=1
opcache.enable_cli=0

; Memoria: 256MB para ~20k ficheros (Drupal 11 + 80 módulos custom)
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000

; NO validar timestamps en producción (FPM reload en cada deploy)
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Mantener comentarios (PHPDoc) — requerido por Drupal DI container
opcache.save_comments=1

; JIT deshabilitado — PHP 8.4 JIT no beneficia a Drupal significativamente
; y puede causar inestabilidad con entity reflection
opcache.jit=off
opcache.jit_buffer_size=0
