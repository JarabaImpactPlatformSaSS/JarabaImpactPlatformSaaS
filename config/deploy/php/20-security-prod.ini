; =============================================================================
; PHP Security Hardening — Production IONOS (SEC-A03, SEC-M01)
; =============================================================================
; Install: copy to /etc/php/8.4/fpm/conf.d/20-security-prod.ini
; Deployed automatically by deploy.yml sync step.
; =============================================================================

; --- Information Disclosure Prevention ---
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On

; --- Session Security ---
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 1440

; --- Upload Safety ---
; Max upload size aligned with Nginx client_max_body_size (64M).
upload_max_filesize = 64M
post_max_size = 64M
