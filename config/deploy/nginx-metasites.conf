# ==============================================================================
# 4. plataformadeecosistemas.com — SaaS Base Domain (Tenants)
# ==============================================================================

# www → non-www.
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.plataformadeecosistemas.com;
    return 301 https://plataformadeecosistemas.com$request_uri;

    # ssl_certificate /etc/letsencrypt/live/plataformadeecosistemas.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/plataformadeecosistemas.com/privkey.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name plataformadeecosistemas.com *.plataformadeecosistemas.com;
    return 301 https://$host$request_uri;
}

# SaaS base + tenant subdomains (*.plataformadeecosistemas.com).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plataformadeecosistemas.com *.plataformadeecosistemas.com;

    root /var/www/jaraba/web;
    index index.php;

    # Wildcard SSL para subdominios tenant.
    # Requiere certbot DNS challenge o cert de pago.
    # ssl_certificate /etc/letsencrypt/live/plataformadeecosistemas.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/plataformadeecosistemas.com/privkey.pem;

    include /etc/nginx/snippets/jaraba-common.conf;
}
