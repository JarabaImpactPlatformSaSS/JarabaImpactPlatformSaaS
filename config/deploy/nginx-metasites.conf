# ==============================================================================
# Nginx — Jaraba Impact Platform — 3 Meta-Sitios + SaaS Tenants
# ==============================================================================
#
# Servidor: IONOS Dedicated L-16 NVMe
# Stack: Drupal 11 + PHP 8.4 (php-fpm) + MariaDB 10.11 + Redis 7.4
#
# INSTALACION:
#   1. Copiar a /etc/nginx/sites-available/jaraba-metasites.conf
#   2. ln -s /etc/nginx/sites-available/jaraba-metasites.conf /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d plataformadeecosistemas.es -d www.plataformadeecosistemas.es \
#        -d pepejaraba.com -d www.pepejaraba.com \
#        -d jarabaimpact.com -d www.jarabaimpact.com \
#        -d plataformadeecosistemas.com -d www.plataformadeecosistemas.com
#
# DOMAIN-ROUTE-CACHE-001: Cada hostname tiene su Domain entity en Drupal.
# VARY-HOST-001: Vary: Host se inyecta via SecurityHeadersSubscriber (PHP).
# ==============================================================================

# ── Upstream PHP-FPM ──────────────────────────────────────────────────────────
upstream php-fpm {
    server unix:/run/php/php8.4-fpm.sock;
}

# ── Shared: map para detectar bots ────────────────────────────────────────────
map $http_user_agent $is_bot {
    default 0;
    ~*(bot|crawl|spider|slurp|Googlebot|Bingbot|facebookexternalhit) 1;
}

# ==============================================================================
# 1. plataformadeecosistemas.es — Meta-Sitio Corporativo PED S.L.
# ==============================================================================

# www → non-www redirect.
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.plataformadeecosistemas.es;
    return 301 https://plataformadeecosistemas.es$request_uri;

    # SSL (certbot auto-manages these lines)
    # ssl_certificate /etc/letsencrypt/live/plataformadeecosistemas.es/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/plataformadeecosistemas.es/privkey.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name plataformadeecosistemas.es;
    return 301 https://plataformadeecosistemas.es$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plataformadeecosistemas.es;

    root /var/www/jaraba/web;
    index index.php;

    # SSL (certbot auto-manages)
    # ssl_certificate /etc/letsencrypt/live/plataformadeecosistemas.es/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/plataformadeecosistemas.es/privkey.pem;

    include /etc/nginx/snippets/jaraba-common.conf;
}

