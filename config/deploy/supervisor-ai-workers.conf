[program:jaraba-i18n-translation]
command=/var/www/jaraba/scripts/queue-worker.sh jaraba_i18n_canvas_translation 300 45
directory=/var/www/jaraba
user=www-data
numprocs=1
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
startsecs=5
startretries=3
stderr_logfile=/var/log/jaraba/i18n-translation-%(process_num)02d.err.log
stdout_logfile=/var/log/jaraba/i18n-translation-%(process_num)02d.out.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_backups=3
priority=500

[group:jaraba-ai]
programs=jaraba-ai-a2a,jaraba-ai-insights,jaraba-ai-quality,jaraba-ai-scheduled,jaraba-i18n-translation
priority=999
