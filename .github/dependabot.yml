version: 2
updates:
  # SAFEGUARD-DEPENDENCY-PROACTIVE-001: Proactive dependency updates.
  # Composer dependencies (actual project dependencies)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "fix(deps)"
    # Group security updates for faster merge.
    groups:
      security-patches:
        applies-to: security-updates
      drupal-contrib:
        patterns:
          - "drupal/*"
      ai-providers:
        patterns:
          - "anthropic/*"
          - "google/*"
          - "openai/*"

  # Theme npm dependencies
  - package-ecosystem: "npm"
    directory: "/web/themes/custom/ecosistema_jaraba_theme"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "fix(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Disable npm for web/core (Drupal core upstream - not used in our build/deploy)
  - package-ecosystem: "npm"
    directory: "/web/core"
    open-pull-requests-limit: 0
