# Pipeline de Integración Continua para JarabaImpactPlatformSaaS
# 
# Este workflow se ejecuta en cada push y pull request
# para validar la calidad del código antes del merge.

name: CI Pipeline

on:
  push:
    branches: [develop, feature/*, hotfix/*]
  pull_request:
    branches: [develop, main]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # JOB 1: LINTING Y ANÁLISIS ESTÁTICO
  # ===========================================
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd, exif, iconv
          tools: composer:v2, phpcs, phpstan
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-dev-${{ hashFiles('composer.lock') }}

      # AUDIT-SEC-N11: Install WITH dev dependencies so PHPStan security
      # extensions (phpstan-strict-rules, phpstan-disallowed-calls) are available.
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP CodeSniffer (Drupal Standard) — baseline mode
        run: bash scripts/ci/phpcs-with-baseline.sh

      # AUDIT-SEC-N11: SAST enhancement — PHPStan with security rules.
      # Uses phpstan.neon (level 6 + phpstan-security.neon) for full
      # security-focused static analysis on every PR.
      # MUST NOT have continue-on-error: true — SAST failures block the build.
      - name: PHPStan Static Analysis (Level 6 + Security Rules)
        run: |
          vendor/bin/phpstan analyse -c phpstan.neon --no-progress --error-format=github

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js --if-present

      - name: Stylelint
        run: npm run lint:css --if-present

      - name: Module consistency check (MODULE-ORPHAN-001)
        run: bash scripts/maintenance/check-module-consistency.sh

      - name: Architectural validation (DI, routing, entities, queries)
        run: bash scripts/validation/validate-all.sh --full

      # SERVICE-ORPHAN-001: Detect orphaned services (standalone for clarity).
      - name: Validate service consumers
        run: php scripts/validation/validate-service-consumers.php

      # ASSET-FRESHNESS-001: Compiled CSS must be up-to-date.
      - name: Validate compiled assets freshness
        run: php scripts/validation/validate-compiled-assets.php

      # TEST-COVERAGE-MAP-001: Critical modules must have tests.
      - name: Validate test coverage map
        run: php scripts/validation/validate-test-coverage-map.php

      # CONTAINER-DEPS-001: Service container dependency integrity (blocking).
      - name: Validate container dependencies
        run: php scripts/validation/validate-container-deps.php

      # CONTAINER-DEPS-002: Circular reference detection (blocking).
      - name: Validate circular dependencies
        run: php scripts/validation/validate-circular-deps.php

      # LOGGER-INJECT-001: Logger injection mismatch detection (blocking).
      - name: Validate logger injection consistency
        run: php scripts/validation/validate-logger-injection.php

      # OPTIONAL-CROSSMODULE-001: Cross-module hard deps (blocking).
      - name: Validate cross-module optional deps
        run: php scripts/validation/validate-optional-deps.php

  # ===========================================
  # JOB 2: TESTS UNITARIOS
  # ===========================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: drupal_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd
          tools: composer:v2
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Copy test environment config
        run: cp .env.ci .env || echo "No .env.ci file found"

      - name: Run PHPUnit tests
        run: |
          ./vendor/bin/phpunit \
            --configuration phpunit.xml \
            --coverage-clover coverage.xml \
            --testsuite Unit
        env:
          SIMPLETEST_DB: mysql://root:root@127.0.0.1:3306/drupal_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Check coverage threshold (80%)
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(php -r "
              \$xml = simplexml_load_file('coverage.xml');
              \$metrics = \$xml->project->metrics;
              \$stmts = (int)\$metrics['statements'];
              \$covered = (int)\$metrics['coveredstatements'];
              if (\$stmts > 0) {
                echo round((\$covered / \$stmts) * 100, 2);
              } else {
                echo '0';
              }
            ")
            echo "Coverage: ${COVERAGE}%"
            if [ "$(echo "${COVERAGE} < 80" | bc -l)" -eq 1 ]; then
              echo "::error::Coverage ${COVERAGE}% is below the 80% threshold"
              exit 1
            fi
            echo "::notice::Coverage ${COVERAGE}% meets the 80% threshold"
          else
            echo "::warning::coverage.xml not found, skipping coverage check"
          fi

  # ===========================================
  # JOB 2B: KERNEL TESTS
  # ===========================================
  kernel-test:
    name: 🔬 Kernel Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: drupal_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Copy test environment config
        run: cp .env.ci .env || true

      - name: Run Kernel Tests
        run: ./vendor/bin/phpunit --configuration phpunit.xml --testsuite Kernel --no-coverage
        env:
          SIMPLETEST_DB: mysql://root:root@127.0.0.1:3306/drupal_test

  # ===========================================
  # JOB 3: ANÁLISIS DE SEGURIDAD
  # ===========================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist

      - name: Composer Audit
        run: composer audit --no-dev

      # AUDIT-SEC-N10: Trivy must block on CRITICAL/HIGH vulnerabilities.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          security-checks: 'vuln,secret'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ===========================================
  # JOB 4: BUILD CHECK
  # ===========================================
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, kernel-test, security]
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build frontend assets
        run: |
          npm ci --production=false
          npm run build --if-present

      - name: Verify SCSS compilation freshness (SCSS-BUILD-CI-001)
        run: |
          cd web/themes/custom/ecosistema_jaraba_theme
          npm ci --production=false 2>/dev/null || true
          npm run build 2>/dev/null || true
          cd "$GITHUB_WORKSPACE"
          if ! git diff --quiet web/themes/custom/ecosistema_jaraba_theme/css/; then
            echo "::error::SCSS-BUILD-CI-001: CSS compilado no está actualizado. Ejecutar 'npm run build' en el tema y commitear los cambios."
            git diff --stat web/themes/custom/ecosistema_jaraba_theme/css/
            exit 1
          fi
          echo "✅ SCSS-BUILD-CI-001: CSS compilado está actualizado"

      - name: Check Drupal requirements
        run: |
          php -r "require 'vendor/autoload.php'; echo 'Autoloader OK\n';"

      - name: Verify module structure
        run: |
          echo "Verificando estructura del módulo ecosistema_jaraba_core..."
          test -f web/modules/custom/ecosistema_jaraba_core/ecosistema_jaraba_core.info.yml
          test -f web/modules/custom/ecosistema_jaraba_core/ecosistema_jaraba_core.services.yml
          echo "✅ Estructura del módulo verificada"
