# ==============================================
# BACKUP DIARIO AUTOMATIZADO (IONOS Dedicado)
# ==============================================
# Cron diario a las 03:00 UTC (05:00 CET).
# Independiente del pipeline de deploy.
#
# SSH: jaraba@<DEPLOY_HOST> puerto 2222 (key ed25519)
# Flujo: SSH → Backup → Verificación → Rotación → Notificación
#
# Naming: db_daily_{YYYYMMDD_HHMMSS}.sql.gz
# Directorio: ~/backups/daily/ (separado de pre_deploy para GoodSync)
# Retención:
#   - Diarios < 30 días: todos se mantienen
#   - 30-84 días: solo lunes (semanal)
#   - > 84 días: se eliminan
#   - Pre-deploy > 30 días: se eliminan (en ~/backups/pre_deploy/)
# ==============================================

name: Jaraba SaaS - Daily Backup

on:
  schedule:
    # Diario a las 03:00 UTC (05:00 CET)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_rotation:
        description: 'Skip backup rotation (keep all backups)'
        required: false
        default: 'false'
        type: boolean

env:
  PHP_VERSION: '8.4'
  DEPLOY_USER: 'jaraba'
  DEPLOY_PORT: '2222'
  SITE_DIR: '/var/www/jaraba'
  BACKUP_DIR: '~/backups/daily'
  RETENTION_DAILY_DAYS: 30
  RETENTION_WEEKLY_DAYS: 84

jobs:
  backup:
    name: 💾 Daily Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.IONOS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure backup directories exist
        run: |
          echo "📁 Ensuring backup directories exist..."
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'MEOF'
            mkdir -p ~/backups/daily ~/backups/pre_deploy
            echo "Backup directories ready"
          MEOF

      - name: Create daily backup
        id: backup
        run: |
          echo "💾 Creating daily backup..."

          BACKUP_RESULT=$(ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            mkdir -p ~/backups/daily
            BACKUP_FILE="db_daily_$(date +%Y%m%d_%H%M%S).sql.gz"
            BACKUP_PATH="$HOME/backups/daily/$BACKUP_FILE"

            # Try drush sql-dump first
            vendor/bin/drush sql-dump --gzip > "$BACKUP_PATH" 2>/dev/null

            if [ $? -ne 0 ] || [ ! -s "$BACKUP_PATH" ]; then
              echo "⚠️ Drush sql-dump failed. Trying mysqldump..."
              rm -f "$BACKUP_PATH"

              SETTINGS_FILE="web/sites/default/settings.local.php"
              if [ ! -f "$SETTINGS_FILE" ]; then
                SETTINGS_FILE="web/sites/default/settings.php"
              fi
              DBNAME=$(grep "'database'" "$SETTINGS_FILE" | head -1 | grep -o "'[^']*'" | tail -1 | tr -d "'")
              DBUSER=$(grep "'username'" "$SETTINGS_FILE" | head -1 | grep -o "'[^']*'" | tail -1 | tr -d "'")
              DBPASS=$(grep "'password'" "$SETTINGS_FILE" | head -1 | grep -o "'[^']*'" | tail -1 | tr -d "'")

              if [ -n "$DBNAME" ] && [ -n "$DBUSER" ]; then
                mysqldump -u"$DBUSER" -p"$DBPASS" "$DBNAME" | gzip > "$BACKUP_PATH"
                echo "METHOD=mysqldump"
              else
                echo "STATUS=failed"
                echo "ERROR=No database credentials found"
                exit 1
              fi
            else
              echo "METHOD=drush"
            fi

            if [ -s "$BACKUP_PATH" ]; then
              SIZE=$(stat -c %s "$BACKUP_PATH" 2>/dev/null || echo "0")
              echo "STATUS=success"
              echo "FILE=$BACKUP_FILE"
              echo "SIZE=$SIZE"
            else
              echo "STATUS=failed"
              echo "ERROR=Backup file is empty"
              exit 1
            fi
          EOF
          )

          echo "$BACKUP_RESULT"

          # Extract variables
          STATUS=$(echo "$BACKUP_RESULT" | grep "STATUS=" | cut -d= -f2)
          FILE=$(echo "$BACKUP_RESULT" | grep "FILE=" | cut -d= -f2)
          SIZE=$(echo "$BACKUP_RESULT" | grep "SIZE=" | cut -d= -f2)

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

          if [ "$STATUS" != "success" ]; then
            echo "❌ Backup failed!"
            exit 1
          fi

          echo "✅ Backup created: $FILE ($SIZE bytes)"

      - name: Verify backup integrity
        id: verify
        run: |
          echo "🔍 Verifying backup integrity..."

          VERIFY_RESULT=$(ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'VEOF'
            BACKUP_FILE=$(ls -t ~/backups/daily/db_daily_*.sql.gz 2>/dev/null | head -1)

            if [ -z "$BACKUP_FILE" ]; then
              echo "INTEGRITY=missing"
              exit 1
            fi

            # Test gzip integrity
            gzip -t "$BACKUP_FILE" 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "INTEGRITY=valid"
            else
              echo "INTEGRITY=corrupt"
              exit 1
            fi

            # Check minimum size (1KB)
            SIZE=$(stat -c %s "$BACKUP_FILE" 2>/dev/null || echo "0")
            if [ "$SIZE" -lt 1024 ]; then
              echo "INTEGRITY=too_small"
              echo "SIZE=$SIZE"
              exit 1
            fi

            echo "SIZE=$SIZE"
          VEOF
          )

          echo "$VERIFY_RESULT"

          INTEGRITY=$(echo "$VERIFY_RESULT" | grep "INTEGRITY=" | cut -d= -f2)
          echo "integrity=$INTEGRITY" >> $GITHUB_OUTPUT

          if [ "$INTEGRITY" != "valid" ]; then
            echo "❌ Backup integrity check failed: $INTEGRITY"
            exit 1
          fi

          echo "✅ Backup integrity verified"

      - name: Rotate old backups
        if: ${{ github.event.inputs.skip_rotation != 'true' }}
        run: |
          echo "🔄 Rotating old backups..."

          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'REOF'
            NOW=$(date +%s)
            DELETED=0
            KEPT=0

            # Process daily backups in ~/backups/daily/
            cd ~/backups/daily 2>/dev/null || true
            for FILE in db_daily_*.sql.gz; do
              [ -e "$FILE" ] || continue

              MODIFIED=$(stat -c %Y "$FILE" 2>/dev/null || echo "0")
              AGE_DAYS=$(( (NOW - MODIFIED) / 86400 ))

              if [ "$AGE_DAYS" -gt 84 ]; then
                # > 84 days (12 weeks): delete all
                rm -f "$FILE"
                DELETED=$((DELETED + 1))
                echo "  Deleted (>84d): $FILE"
              elif [ "$AGE_DAYS" -gt 30 ]; then
                # 30-84 days: keep only Monday backups
                DAY_OF_WEEK=$(date -d "@$MODIFIED" +%u 2>/dev/null || echo "0")
                if [ "$DAY_OF_WEEK" != "1" ]; then
                  rm -f "$FILE"
                  DELETED=$((DELETED + 1))
                  echo "  Deleted (30-84d, not Monday): $FILE"
                else
                  KEPT=$((KEPT + 1))
                fi
              else
                KEPT=$((KEPT + 1))
              fi
            done

            # Process pre-deploy backups > 30 days in ~/backups/pre_deploy/
            cd ~/backups/pre_deploy 2>/dev/null || true
            for FILE in db_pre_deploy_*.sql.gz; do
              [ -e "$FILE" ] || continue

              MODIFIED=$(stat -c %Y "$FILE" 2>/dev/null || echo "0")
              AGE_DAYS=$(( (NOW - MODIFIED) / 86400 ))

              if [ "$AGE_DAYS" -gt 30 ]; then
                rm -f "$FILE"
                DELETED=$((DELETED + 1))
                echo "  Deleted pre-deploy (>30d): $FILE"
              else
                KEPT=$((KEPT + 1))
              fi
            done

            echo ""
            echo "Rotation complete: $DELETED deleted, $KEPT kept"
            echo "Current daily backups:"
            ls -lh ~/backups/daily/db_daily_*.sql.gz 2>/dev/null | wc -l
            echo "Current pre-deploy backups:"
            ls -lh ~/backups/pre_deploy/db_pre_deploy_*.sql.gz 2>/dev/null | wc -l
          REOF

      - name: Report success
        if: success()
        run: |
          echo "✅ Daily backup completed successfully!"
          echo "  File: ${{ steps.backup.outputs.file }}"
          echo "  Size: ${{ steps.backup.outputs.size }} bytes"
          echo "  Integrity: ${{ steps.verify.outputs.integrity }}"

      - name: Notify failure via email
        if: failure()
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /var/www/jaraba && php scripts/ci-notify-email.php \
              '[CI] Daily Backup FAILED' \
              '<h2>Daily Backup Failed</h2><p><b>Status:</b> ${{ steps.backup.outputs.status || 'unknown' }}</p><p><b>Integrity:</b> ${{ steps.verify.outputs.integrity || 'not checked' }}</p><p><b>File:</b> ${{ steps.backup.outputs.file || 'none' }}</p><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Logs</a></p>'"
