# SAFEGUARD-SECRET-ROTATION-001: Monthly check for stale secrets.
# Alerts via GitHub Issue when secrets exceed 90-day rotation threshold.

name: Secret Rotation Check

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of each month at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-rotation:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret ages
        uses: actions/github-script@v7
        with:
          script: |
            const ROTATION_THRESHOLD_DAYS = 90;
            const now = new Date();

            // Secrets that should be rotated periodically.
            const criticalSecrets = [
              'ANTHROPIC_API_KEY',
              'STRIPE_SECRET_KEY',
              'STRIPE_WEBHOOK_SECRET',
              'STRIPE_FOC_WEBHOOK_SECRET',
              'SUPPORT_ATTACHMENT_HMAC_SECRET',
              'REDIS_PASSWORD',
            ];

            // Get all secrets metadata.
            const { data: secrets } = await github.rest.actions.listRepoSecrets({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const staleSecrets = [];
            for (const secret of secrets.secrets) {
              if (!criticalSecrets.includes(secret.name)) continue;

              const updatedAt = new Date(secret.updated_at);
              const ageDays = Math.floor((now - updatedAt) / (1000 * 60 * 60 * 24));

              if (ageDays > ROTATION_THRESHOLD_DAYS) {
                staleSecrets.push({
                  name: secret.name,
                  age: ageDays,
                  updated: secret.updated_at.split('T')[0],
                });
              }
            }

            if (staleSecrets.length === 0) {
              console.log('All critical secrets are within rotation threshold.');
              return;
            }

            // Create issue for stale secrets.
            const table = staleSecrets.map(s =>
              `| ${s.name} | ${s.age} days | ${s.updated} |`
            ).join('\n');

            const body = `## Secret Rotation Alert

            The following secrets exceed the ${ROTATION_THRESHOLD_DAYS}-day rotation threshold:

            | Secret | Age | Last Updated |
            |--------|-----|-------------|
            ${table}

            ### Action Required
            1. Generate new values for each secret
            2. Update in GitHub Settings > Secrets
            3. Re-deploy to propagate via settings.env.php

            > SAFEGUARD-SECRET-ROTATION-001 — automated monthly check`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] ${staleSecrets.length} secret(s) need rotation`,
              body: body,
              labels: ['security-review-required', 'automated'],
            });
