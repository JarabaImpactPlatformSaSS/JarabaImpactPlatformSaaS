# ==============================================
# DEPLOY A PRODUCCIÓN (SERVIDOR DEDICADO)
# ==============================================
# Pipeline PRINCIPAL de deploy a producción.
# Host: IONOS Dedicated AE16-128 NVMe XL (Ubuntu 24.04)
# Stack: Nginx + PHP 8.4 FPM + MariaDB 10.11 + Redis 7.4
# Estrategia: git-based deploy con maintenance mode.
#
# Flujo: Lint → Test → Backup → Deploy → Reload FPM → Smoke Test
#
# SSH: jaraba@<DEPLOY_HOST> puerto 2222 (key ed25519)
# Path: /var/www/jaraba
# ==============================================

name: Jaraba SaaS - Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_backup:
        description: 'Skip pre-deployment backup'
        required: false
        default: 'false'
        type: boolean
      force_regenerate_settings:
        description: 'Force regenerate settings.local.php'
        required: false
        default: 'false'
        type: boolean

env:
  PHP_VERSION: '8.4'
  DEPLOY_USER: 'jaraba'
  DEPLOY_PORT: '2222'
  SITE_DIR: '/var/www/jaraba'

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, pdo_sqlite, sqlite3, dom, filter, gd, json, phar
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Module consistency check (MODULE-ORPHAN-001)
        run: bash scripts/maintenance/check-module-consistency.sh

      - name: Architectural validation (DI, routing, entities, queries)
        run: bash scripts/validation/validate-all.sh --full

      - name: Run PHPUnit Unit tests
        run: vendor/bin/phpunit --configuration phpunit.xml --no-progress --testsuite Unit

      - name: Run PHPUnit Kernel tests
        env:
          SIMPLETEST_DB: sqlite://localhost//tmp/test.sqlite
          SIMPLETEST_BASE_URL: http://localhost
        run: vendor/bin/phpunit --configuration phpunit.xml --no-progress --testsuite Kernel

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify compiled CSS is up-to-date (SCSS-COMPILE-VERIFY-001)
        run: |
          cd web/themes/custom/ecosistema_jaraba_theme
          npm ci
          npm run build
          cd $GITHUB_WORKSPACE
          if ! git diff --quiet -- web/themes/custom/ecosistema_jaraba_theme/css/ web/themes/custom/ecosistema_jaraba_theme/js/dist/; then
            echo "::error::Compiled CSS/JS is stale! Run 'npm run build' in ecosistema_jaraba_theme and commit the output."
            git diff --stat -- web/themes/custom/ecosistema_jaraba_theme/css/ web/themes/custom/ecosistema_jaraba_theme/js/dist/
            exit 1
          fi
          echo "✅ Compiled CSS/JS is up-to-date"

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.IONOS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create pre-deploy backup
        if: ${{ github.event.inputs.skip_backup != 'true' }}
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            mkdir -p /opt/jaraba/backups/pre_deploy
            BACKUP_FILE="/opt/jaraba/backups/pre_deploy/db_pre_deploy_$(date +%Y%m%d_%H%M%S).sql.gz"
            drush sql-dump --gzip > "$BACKUP_FILE" 2>/dev/null || {
              echo "⚠️ Drush sql-dump failed. Using mysqldump..."
              mysqldump -u drupal -p"$(drush eval "echo \Drupal::database()->getConnectionOptions()['password'];")" jaraba | gzip > "$BACKUP_FILE"
            }
            if [ -s "$BACKUP_FILE" ]; then
              echo "✅ Backup: $BACKUP_FILE ($(stat -c %s "$BACKUP_FILE") bytes)"
            else
              echo "⚠️ Backup failed, continuing deploy"
            fi
          EOF

      - name: Enable maintenance mode
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /var/www/jaraba && drush state:set system.maintenance_mode 1" \
            || echo "⚠️ Could not enable maintenance mode"

      - name: Ensure settings.local.php exists
        run: |
          FORCE_REGEN="${{ github.event.inputs.force_regenerate_settings }}"
          SSH_CMD="ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SETTINGS_PATH="/var/www/jaraba/web/sites/default/settings.local.php"
          EXISTS=$($SSH_CMD "test -f $SETTINGS_PATH && echo YES || echo NO")

          if [ "$EXISTS" = "YES" ] && [ "$FORCE_REGEN" != "true" ]; then
            echo "✅ settings.local.php already exists"
            exit 0
          fi

          if [ -z "${{ secrets.IONOS_DB_HOST }}" ]; then
            echo "❌ No settings.local.php and no IONOS_DB_* secrets configured"
            exit 1
          fi

          echo "🔄 Generating settings.local.php..."
          cat > /tmp/settings.local.php << 'SETTINGSEOF'
          <?php
          // Production DB credentials (auto-generated by CI/CD).
          $databases['default']['default'] = [
            'database' => 'PLACEHOLDER_DB',
            'username' => 'PLACEHOLDER_USER',
            'password' => 'PLACEHOLDER_PASS',
            'host' => 'PLACEHOLDER_HOST',
            'prefix' => '',
            'port' => 3306,
            'isolation_level' => 'READ COMMITTED',
            'driver' => 'mysql',
            'namespace' => 'Drupal\\mysql\\Driver\\Database\\mysql',
            'autoload' => 'core/modules/mysql/src/Driver/Database/mysql/',
          ];
          SETTINGSEOF

          # Replace placeholders with actual secrets
          sed -i "s/PLACEHOLDER_DB/${{ secrets.IONOS_DB_NAME }}/" /tmp/settings.local.php
          sed -i "s/PLACEHOLDER_USER/${{ secrets.IONOS_DB_USER }}/" /tmp/settings.local.php
          sed -i "s/PLACEHOLDER_PASS/${{ secrets.IONOS_DB_PASS }}/" /tmp/settings.local.php
          sed -i "s/PLACEHOLDER_HOST/${{ secrets.IONOS_DB_HOST }}/" /tmp/settings.local.php

          $SSH_CMD "chmod 755 /var/www/jaraba/web/sites/default 2>/dev/null || true"
          scp -P ${{ env.DEPLOY_PORT }} /tmp/settings.local.php ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$SETTINGS_PATH
          $SSH_CMD "chmod 440 $SETTINGS_PATH && chmod 555 /var/www/jaraba/web/sites/default"
          rm -f /tmp/settings.local.php
          echo "✅ settings.local.php created"

      - name: Pull code and install dependencies
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba

            # Unlock permissions for git
            chmod 755 web/sites/default
            chmod 644 web/sites/default/settings.php

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Restore secure permissions
            chmod 555 web/sites/default
            chmod 444 web/sites/default/settings.php

            # Verify settings.local.php survived git reset
            if [ ! -f web/sites/default/settings.local.php ]; then
              echo "❌ FATAL: settings.local.php disappeared after git reset"
              exit 1
            fi

            # Install dependencies (no vendor wipe needed — dedicated server has no permission issues)
            composer install --no-dev --optimize-autoloader --no-progress
          EOF

      # CRITICAL: Generate settings.env.php AFTER git pull (not before).
      # git reset --hard overwrites settings.env.php with the empty stub from
      # the repo. This step must run AFTER pull to write the real API keys.
      - name: Generate settings.env.php (ENV-BOOTSTRAP-001)
        env:
          KEY_OPENAI: ${{ secrets.OPENAI_API_KEY }}
          KEY_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY }}
          KEY_GEMINI: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          KEY_QDRANT: ${{ secrets.QDRANT_API_KEY }}
          KEY_RECAPTCHA_SITE: ${{ secrets.RECAPTCHA_SITE_KEY }}
          KEY_RECAPTCHA_SECRET: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          KEY_STRIPE_PUBLIC: ${{ secrets.STRIPE_PUBLIC_KEY }}
          KEY_STRIPE_SECRET: ${{ secrets.STRIPE_SECRET_KEY }}
          KEY_STRIPE_WEBHOOK: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          KEY_STRIPE_FOC_WEBHOOK: ${{ secrets.STRIPE_FOC_WEBHOOK_SECRET }}
          KEY_SMTP_USER: ${{ secrets.SMTP_USER }}
          KEY_SMTP_PASS: ${{ secrets.SMTP_PASS }}
          KEY_SMTP_HOST: ${{ secrets.SMTP_HOST }}
          KEY_GOOGLE_CLIENT_ID: ${{ secrets.SOCIAL_AUTH_GOOGLE_CLIENT_ID }}
          KEY_GOOGLE_CLIENT_SECRET: ${{ secrets.SOCIAL_AUTH_GOOGLE_CLIENT_SECRET }}
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOFENV
            cd /var/www/jaraba
            ENV_FILE=config/deploy/settings.env.php

            chmod 644 "\$ENV_FILE" 2>/dev/null || true

            {
              echo "<?php"
              echo ""
              echo "// ENV-BOOTSTRAP-001: Auto-generated by CI/CD ($(date -u +%Y-%m-%dT%H:%M:%SZ))."
              echo "// Loads BEFORE settings.secrets.php so getenv() works."
              echo "// DO NOT EDIT MANUALLY — re-run deploy pipeline to update."
              echo ""
              echo "// AI Providers"
              [ -n "${KEY_OPENAI}" ] && echo "putenv('OPENAI_API_KEY=${KEY_OPENAI}');"
              [ -n "${KEY_ANTHROPIC}" ] && echo "putenv('ANTHROPIC_API_KEY=${KEY_ANTHROPIC}');"
              [ -n "${KEY_GEMINI}" ] && echo "putenv('GOOGLE_GEMINI_API_KEY=${KEY_GEMINI}');"
              [ -n "${KEY_QDRANT}" ] && echo "putenv('QDRANT_API_KEY=${KEY_QDRANT}');"
              echo ""
              echo "// reCAPTCHA v3"
              [ -n "${KEY_RECAPTCHA_SITE}" ] && echo "putenv('RECAPTCHA_SITE_KEY=${KEY_RECAPTCHA_SITE}');"
              [ -n "${KEY_RECAPTCHA_SECRET}" ] && echo "putenv('RECAPTCHA_SECRET_KEY=${KEY_RECAPTCHA_SECRET}');"
              echo ""
              echo "// Stripe"
              [ -n "${KEY_STRIPE_PUBLIC}" ] && echo "putenv('STRIPE_PUBLIC_KEY=${KEY_STRIPE_PUBLIC}');"
              [ -n "${KEY_STRIPE_SECRET}" ] && echo "putenv('STRIPE_SECRET_KEY=${KEY_STRIPE_SECRET}');"
              [ -n "${KEY_STRIPE_WEBHOOK}" ] && echo "putenv('STRIPE_WEBHOOK_SECRET=${KEY_STRIPE_WEBHOOK}');"
              [ -n "${KEY_STRIPE_FOC_WEBHOOK}" ] && echo "putenv('STRIPE_FOC_WEBHOOK_SECRET=${KEY_STRIPE_FOC_WEBHOOK}');"
              echo ""
              echo "// SMTP"
              [ -n "${KEY_SMTP_USER}" ] && echo "putenv('SMTP_USER=${KEY_SMTP_USER}');"
              [ -n "${KEY_SMTP_PASS}" ] && echo "putenv('SMTP_PASS=${KEY_SMTP_PASS}');"
              [ -n "${KEY_SMTP_HOST}" ] && echo "putenv('SMTP_HOST=${KEY_SMTP_HOST}');"
              echo ""
              echo "// OAuth"
              [ -n "${KEY_GOOGLE_CLIENT_ID}" ] && echo "putenv('SOCIAL_AUTH_GOOGLE_CLIENT_ID=${KEY_GOOGLE_CLIENT_ID}');"
              [ -n "${KEY_GOOGLE_CLIENT_SECRET}" ] && echo "putenv('SOCIAL_AUTH_GOOGLE_CLIENT_SECRET=${KEY_GOOGLE_CLIENT_SECRET}');"
            } > "\$ENV_FILE"

            chmod 440 "\$ENV_FILE"
            echo "✅ settings.env.php generated with $(grep -c putenv "\$ENV_FILE") env vars"
          EOFENV

      - name: Pre-deploy diagnostics
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            echo "=== Drush Status ==="
            drush status --fields=drupal-version,db-status,bootstrap 2>&1 || echo "⚠️ drush status failed"
            echo ""
            echo "=== Pending DB Updates ==="
            drush updatedb:status 2>&1 || echo "⚠️ updatedb:status failed"
            echo ""
            echo "=== Pending Config Changes ==="
            drush config:status 2>&1 | head -15 || echo "⚠️ config:status failed"
          EOF

      - name: Run database updates
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            echo "=== Running updatedb ==="
            drush updatedb -y -v 2>&1
            UPDB_EXIT=$?
            if [ $UPDB_EXIT -ne 0 ]; then
              echo "❌ updatedb failed"
              tail -50 /var/log/jaraba/php-error.log 2>/dev/null || echo "No PHP error log"
              exit 1
            fi
          EOF

      - name: Sync site UUID for config import
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            CONFIG_UUID=$(grep '^uuid:' config/sync/system.site.yml | awk '{print $2}')
            SITE_UUID=$(drush eval "echo \Drupal::config('system.site')->get('uuid');" 2>/dev/null)
            echo "Config UUID: $CONFIG_UUID"
            echo "Site  UUID: $SITE_UUID"
            if [ "$CONFIG_UUID" != "$SITE_UUID" ] && [ -n "$CONFIG_UUID" ]; then
              drush config:set system.site uuid "$CONFIG_UUID" -y 2>&1
              echo "✅ Site UUID updated to match config"
            else
              echo "✅ UUIDs match"
            fi
          EOF

      - name: Import config and rebuild cache
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            drush config:import -y 2>&1 || echo "⚠️ Config import had issues (non-blocking)"
            drush cache:rebuild 2>&1

            # CRITICAL: Reload PHP-FPM to invalidate OPcache.
            # Production uses opcache.validate_timestamps=0, so without reload
            # PHP serves STALE CODE after deploy.
            echo "=== Reloading PHP-FPM (OPcache invalidation) ==="
            sudo systemctl reload php8.4-fpm
            echo "✅ PHP-FPM reloaded"
          EOF

      - name: Auto-import missing config/install defaults (CONFIG-INSTALL-001)
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            echo "=== Checking for missing config/install defaults ==="
            drush eval "
              \$module_handler = \Drupal::moduleHandler();
              \$config_factory = \Drupal::configFactory();
              \$imported = 0;
              foreach (\$module_handler->getModuleList() as \$module_name => \$extension) {
                \$config_dir = \$extension->getPath() . '/config/install';
                if (!is_dir(DRUPAL_ROOT . '/' . \$config_dir)) continue;
                \$files = glob(DRUPAL_ROOT . '/' . \$config_dir . '/*.yml');
                foreach (\$files as \$file) {
                  \$config_name = basename(\$file, '.yml');
                  if (!str_starts_with(\$config_name, \$module_name . '.')) continue;
                  \$config = \$config_factory->get(\$config_name);
                  if (\$config->isNew()) {
                    \$yaml = file_get_contents(\$file);
                    \$data = \Symfony\Component\Yaml\Yaml::parse(\$yaml);
                    if (\$data) {
                      \$config_factory->getEditable(\$config_name)->setData(\$data)->save();
                      echo \"  Imported: \$config_name\" . PHP_EOL;
                      \$imported++;
                    }
                  }
                }
              }
              if (\$imported > 0) {
                echo \"Imported \$imported missing config(s).\" . PHP_EOL;
              } else {
                echo 'All config/install defaults already present.' . PHP_EOL;
              }
            " 2>&1
          EOF

      - name: Auto-remediate entity/field schema (UPDATE-HOOK-REQUIRED-001)
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba

            echo "=== Phase 1: Detect entity/field definition mismatches ==="
            MISMATCHES=$(drush eval "
              \$manager = \Drupal::entityDefinitionUpdateManager();
              \$changes = \$manager->getChangeList();
              if (empty(\$changes)) {
                echo 'CLEAN';
              } else {
                foreach (\$changes as \$type => \$info) {
                  echo \$type . ': ' . json_encode(\$info) . PHP_EOL;
                }
              }
            " 2>&1)
            echo "$MISMATCHES"

            if echo "$MISMATCHES" | grep -q "CLEAN"; then
              echo "✅ Entity/field definitions match database schema"
              exit 0
            fi

            echo ""
            echo "=== Phase 2: Auto-remediate ==="
            drush eval "
              \$manager = \Drupal::entityDefinitionUpdateManager();
              \$changes = \$manager->getChangeList();
              \$applied = 0;
              \$errors = [];
              \$CREATED = 1; \$UPDATED = 2; \$DELETED = 3;

              foreach (\$changes as \$entity_type_id => \$change_info) {
                if (isset(\$change_info['entity_type'])) {
                  \$ct = \$change_info['entity_type'];
                  try {
                    \$definition = \Drupal::entityTypeManager()->getDefinition(\$entity_type_id);
                    if (\$ct === \$CREATED) {
                      \$manager->installEntityType(\$definition);
                      echo \"  ✅ Installed entity type: \$entity_type_id\" . PHP_EOL;
                    } elseif (\$ct === \$UPDATED) {
                      \$manager->updateEntityType(\$definition);
                      echo \"  ✅ Updated entity type: \$entity_type_id\" . PHP_EOL;
                    }
                    \$applied++;
                  } catch (\Throwable \$e) {
                    \$errors[] = \"Entity \$entity_type_id: \" . \$e->getMessage();
                  }
                }

                if (isset(\$change_info['field_storage_definitions'])) {
                  \$field_definitions = \Drupal::service('entity_field.manager')->getFieldStorageDefinitions(\$entity_type_id);
                  foreach (\$change_info['field_storage_definitions'] as \$field_name => \$change_type) {
                    try {
                      if (\$change_type === \$CREATED && isset(\$field_definitions[\$field_name])) {
                        \$fd = \$field_definitions[\$field_name];
                        \$manager->installFieldStorageDefinition(\$field_name, \$entity_type_id, \$fd->getProvider(), \$fd);
                        echo \"  ✅ Installed field: \$entity_type_id.\$field_name\" . PHP_EOL;
                        \$applied++;
                      } elseif (\$change_type === \$UPDATED && isset(\$field_definitions[\$field_name])) {
                        \$fd = \$field_definitions[\$field_name];
                        \$fd->setName(\$field_name);
                        \$fd->setTargetEntityTypeId(\$entity_type_id);
                        \$manager->updateFieldStorageDefinition(\$fd);
                        echo \"  ✅ Updated field: \$entity_type_id.\$field_name\" . PHP_EOL;
                        \$applied++;
                      } elseif (\$change_type === \$DELETED) {
                        \$storedDef = \$manager->getFieldStorageDefinition(\$field_name, \$entity_type_id);
                        if (\$storedDef) {
                          \$manager->uninstallFieldStorageDefinition(\$storedDef);
                          echo \"  ✅ Uninstalled orphan field: \$entity_type_id.\$field_name\" . PHP_EOL;
                          \$applied++;
                        }
                      }
                    } catch (\Throwable \$e) {
                      \$errors[] = \"Field \$entity_type_id.\$field_name: \" . \$e->getMessage();
                    }
                  }
                }
              }

              echo PHP_EOL . \"Applied: \$applied changes\" . PHP_EOL;
              if (!empty(\$errors)) {
                echo 'Errors:' . PHP_EOL;
                foreach (\$errors as \$err) { echo \"  ❌ \$err\" . PHP_EOL; }
              }
            " 2>&1

            echo ""
            echo "=== Phase 3: Post-remediation cache rebuild ==="
            drush cache:rebuild 2>&1

            echo ""
            echo "=== Phase 4: Final verification ==="
            FINAL=$(drush eval "
              \$manager = \Drupal::entityDefinitionUpdateManager();
              \$changes = \$manager->getChangeList();
              if (empty(\$changes)) {
                echo 'CLEAN';
              } else {
                foreach (\$changes as \$type => \$info) {
                  echo \$type . ': ' . json_encode(\$info) . PHP_EOL;
                }
              }
            " 2>&1)
            echo "$FINAL"

            if echo "$FINAL" | grep -q "CLEAN"; then
              echo "✅ All schema mismatches auto-remediated"
            else
              echo "❌ BLOCKING: Schema mismatches persist after auto-remediation"
              exit 1
            fi
          EOF

      - name: Restart AI workers
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "=== Restarting AI workers ==="
            sudo supervisorctl restart jaraba-ai:*
            sleep 2
            sudo supervisorctl status jaraba-ai:*
            echo "✅ AI workers restarted"
          EOF

      - name: Disable maintenance mode and verify site
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            drush state:set system.maintenance_mode 0 2>&1
            echo ""
            echo "=== Site verification ==="
            drush status --fields=drupal-version,db-status,bootstrap 2>&1
          EOF

      - name: Smoke test - Platform status endpoint
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          echo "⏳ Waiting 5s for stabilization..."
          sleep 5

          if [ -z "$PRODUCTION_URL" ]; then
            echo "::warning::PRODUCTION_URL not configured. Skipping HTTP health check."
            exit 0
          fi

          HEALTH_URL="${PRODUCTION_URL}/api/v1/platform/status"
          echo "🔍 Checking platform status..."

          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo '000')
            RESPONSE=$(cat /tmp/health_response.json 2>/dev/null || echo '{}')
            STATUS=$(echo "$RESPONSE" | jq -r '.status' 2>/dev/null || echo 'unknown')

            if [ "$STATUS" = "ok" ]; then
              echo "✅ Health check passed! Platform is healthy."
              echo "$RESPONSE" | jq .
              exit 0
            fi

            echo "⚠️ Attempt $i/3: HTTP=$HTTP_CODE status=$STATUS. Retrying in 5s..."
            sleep 5
          done

          echo "⚠️ HTTP health check failed. Falling back to SSH drush..."

          SSH_STATUS=$(ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DRUSHEOF'
            cd /var/www/jaraba
            BOOTSTRAP=$(drush status --field=bootstrap 2>/dev/null)
            DB_STATUS=$(drush status --field=db-status 2>/dev/null)
            DRUPAL_VER=$(drush status --field=drupal-version 2>/dev/null)
            if [ "$BOOTSTRAP" = "Successful" ] && [ "$DB_STATUS" = "Connected" ]; then
              echo "OK:drupal=$DRUPAL_VER,bootstrap=$BOOTSTRAP,db=$DB_STATUS"
            else
              echo "FAIL:bootstrap=$BOOTSTRAP,db=$DB_STATUS"
            fi
          DRUSHEOF
          )

          echo "SSH drush result: $SSH_STATUS"
          if echo "$SSH_STATUS" | grep -q "^OK:"; then
            echo "✅ Health check passed via SSH drush!"
            echo "::warning::HTTP unreachable but deploy verified via SSH."
            exit 0
          fi

          echo "❌ Health check failed!"
          exit 1

      - name: Smoke test - Homepage
        if: success()
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "⚠️ PRODUCTION_URL not set — skipping"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_URL}")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ Homepage returned HTTP $HTTP_STATUS (non-blocking)"
          else
            echo "✅ Homepage OK (HTTP 200)"
          fi

      - name: Diagnose production error
        if: failure()
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /var/www/jaraba
            echo "=== Drush Status ==="
            drush status 2>&1
            echo ""
            echo "=== Recent Watchdog Errors ==="
            drush watchdog:show --count=20 --severity=3 2>&1 || echo "No watchdog available"
            echo ""
            echo "=== PHP-FPM Error Log (last 50 lines) ==="
            tail -50 /var/log/jaraba/php-error.log 2>/dev/null || echo "No PHP error log"
            echo ""
            echo "=== Nginx Error Log (last 30 lines) ==="
            tail -30 /var/log/nginx/error.log 2>/dev/null || echo "No nginx error log"
            echo ""
            echo "=== PHP-FPM Status ==="
            systemctl status php8.4-fpm --no-pager 2>&1 | head -20
            echo ""
            echo "=== Supervisor Status ==="
            sudo supervisorctl status 2>&1
            echo ""
            echo "=== Redis Status ==="
            redis-cli ping 2>&1
            echo ""
            echo "=== Disk Space ==="
            df -h /var/www/jaraba
          EOF

      - name: Notify success
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "Version: $(git describe --tags --always)"
          echo "Commit: ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Deploy Failed*\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Rollback instructions
        if: failure()
        run: |
          echo "❌ Deployment failed! Manual rollback may be required."
          echo ""
          echo "📋 Rollback steps:"
          echo "  1. SSH: ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          echo "  2. Restore DB: gunzip -c /opt/jaraba/backups/pre_deploy/db_pre_deploy_*.sql.gz | mysql jaraba"
          echo "  3. Revert code: cd /var/www/jaraba && git reset --hard HEAD~1"
          echo "  4. Rebuild: composer install --no-dev && drush cr && sudo systemctl reload php8.4-fpm"
