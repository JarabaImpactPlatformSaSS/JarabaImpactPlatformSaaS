services:
  logger.channel.jaraba_social:
    parent: logger.channel_base
    arguments: ['jaraba_social']

  jaraba_social.post_service:
    class: Drupal\jaraba_social\Service\SocialPostService
    arguments:
      - '@entity_type.manager'
      - '@?jaraba_ai_agents.orchestrator'
      - '@queue'
      - '@logger.channel.jaraba_social'

  jaraba_social.account_service:
    class: Drupal\jaraba_social\Service\SocialAccountService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_social'

  jaraba_social.calendar_service:
    class: Drupal\jaraba_social\Service\SocialCalendarService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_social'

  jaraba_social.analytics_service:
    class: Drupal\jaraba_social\Service\SocialAnalyticsService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_social'

  # =========================================================================
  # AI Integration — CopilotBridge + GroundingProvider (AI-COVERAGE-001)
  # =========================================================================

  jaraba_social.copilot_bridge:
    class: Drupal\jaraba_social\Service\SocialCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_social'

  jaraba_social.grounding_provider:
    class: Drupal\jaraba_social\Grounding\SocialPostGroundingProvider
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.grounding_provider }

  jaraba_social.makecom_integration:
    class: Drupal\jaraba_social\Service\MakeComIntegrationService
    arguments:
      - '@entity_type.manager'
      - '@config.factory'
      - '@logger.channel.jaraba_social'
