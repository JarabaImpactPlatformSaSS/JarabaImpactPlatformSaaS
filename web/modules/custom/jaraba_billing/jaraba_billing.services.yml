services:
  jaraba_billing.wallet:
    class: Drupal\jaraba_billing\Service\WalletService
    arguments:
      - '@database'
      - '@logger.channel.default'

  # ===========================================
  # JARABA BILLING — Servicios de Subscripción y Metering
  # ===========================================
  # Extraídos de ecosistema_jaraba_core (TD-003 God Object)
  # Los service IDs originales en ecosistema_jaraba_core.services.yml
  # son ahora aliases backward-compatible que apuntan aquí.

  # Logger channel para billing
  logger.channel.jaraba_billing:
    parent: logger.channel_base
    arguments: ['jaraba_billing']

  # Validador de límites de planes SaaS.
  # P1-01/P1-02: Extendido con límites de Page Builder y Credentials.
  # F2: Integra con UpgradeTriggerService para consultar FreemiumVerticalLimit.
  # El tercer argumento es nullable (?) para backwards compatibility cuando
  # ecosistema_jaraba_core.upgrade_trigger no esta disponible.
  jaraba_billing.plan_validator:
    class: Drupal\jaraba_billing\Service\PlanValidator
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@?ecosistema_jaraba_core.upgrade_trigger'
      - '@?ecosistema_jaraba_core.plan_resolver'
    calls:
      - [setStringTranslation, ['@string_translation']]

  # BE-03 + BIZ-002: Gestión del ciclo de vida de subscripciones
  # GAP-C03: Inyecta StripeSubscriptionService y PlanResolverService para
  # sincronizar cambios de plan y cancelaciones con Stripe.
  jaraba_billing.tenant_subscription:
    class: Drupal\jaraba_billing\Service\TenantSubscriptionService
    arguments:
      - '@jaraba_billing.plan_validator'
      - '@logger.channel.jaraba_billing'
      - '@?ecosistema_jaraba_core.plan_resolver'

  # Metering avanzado por tenant (usage-based pricing)
  # Prices read from FairUsePolicy ConfigEntity via FairUsePolicyService.
  jaraba_billing.tenant_metering:
    class: Drupal\jaraba_billing\Service\TenantMeteringService
    arguments:
      - '@database'
      - '@cache.default'
      - '@jaraba_billing.wallet'
      - '@?ecosistema_jaraba_core.fair_use_policy'

  # Motor de cálculo de precios basado en PricingRule
  jaraba_billing.pricing_engine:
    class: Drupal\jaraba_billing\Service\PricingRuleEngine
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'

  # Reverse Trial con downgrade automático
  jaraba_billing.reverse_trial:
    class: Drupal\jaraba_billing\Service\ReverseTrialService
    arguments:
      - '@entity_type.manager'
      - '@logger.factory'
      - '@plugin.manager.mail'
      - '@state'

  # GAP-REVENUE-DASH: Core SaaS revenue KPIs.
  jaraba_billing.revenue_metrics:
    class: Drupal\jaraba_billing\Service\RevenueMetricsService
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.channel.jaraba_billing'
      - '@?jaraba_billing.synthetic_cfo'

  # Tracking de expansion revenue y PQA
  jaraba_billing.expansion_revenue:
    class: Drupal\jaraba_billing\Service\ExpansionRevenueService
    arguments:
      - '@entity_type.manager'
      - '@state'
      - '@logger.factory'

  # Créditos de impacto para gamificación y engagement
  jaraba_billing.impact_credit:
    class: Drupal\jaraba_billing\Service\ImpactCreditService
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'

  # Agente CFO Sintético para Emprendimiento Digital
  jaraba_billing.synthetic_cfo:
    class: Drupal\jaraba_billing\Service\SyntheticCfoService
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@logger.factory'

  # ===========================================
  # STRIPE INTEGRATION — Servicios de integración real
  # ===========================================

  # Sincronizacion bidireccional Drupal→Stripe de Products/Prices.
  # STRIPE-CHECKOUT-001 §4.1: Invocado desde hook_entity_presave de SaasPlan.
  # AUDIT-PERF-002: Lock para prevenir race conditions.
  jaraba_billing.stripe_product_sync:
    class: Drupal\jaraba_billing\Service\StripeProductSyncService
    arguments:
      - '@?jaraba_foc.stripe_connect'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@lock'

  # Checkout Session para Stripe Embedded Checkout.
  # STRIPE-CHECKOUT-001 §5.1: Crea sessions con ui_mode=embedded.
  jaraba_billing.checkout_session:
    class: Drupal\jaraba_billing\Service\CheckoutSessionService
    arguments:
      - '@?jaraba_foc.stripe_connect'
      - '@?jaraba_billing.stripe_customer'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@config.factory'

  # Gestión de clientes Stripe
  # AUDIT-PERF-002: Inyección de @lock para prevenir race conditions.
  jaraba_billing.stripe_customer:
    class: Drupal\jaraba_billing\Service\StripeCustomerService
    arguments:
      - '@?jaraba_foc.stripe_connect'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@lock'

  # Gestión de suscripciones Stripe
  # AUDIT-PERF-002: Inyección de @lock para prevenir race conditions.
  jaraba_billing.stripe_subscription:
    class: Drupal\jaraba_billing\Service\StripeSubscriptionService
    arguments:
      - '@?jaraba_foc.stripe_connect'
      - '@?jaraba_billing.tenant_subscription'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@lock'

  # Sincronización de facturas Stripe
  # AUDIT-PERF-002: Inyección de @lock para prevenir race conditions.
  jaraba_billing.stripe_invoice:
    class: Drupal\jaraba_billing\Service\StripeInvoiceService
    arguments:
      - '@?jaraba_foc.stripe_connect'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@lock'

  # GAP-PRORATION: Proration preview for plan changes.
  jaraba_billing.proration:
    class: Drupal\jaraba_billing\Service\ProrationService
    arguments:
      - '@?jaraba_foc.stripe_connect'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'

  # ===========================================
  # DUNNING + FEATURE ACCESS — Servicios de clase mundial
  # ===========================================

  # Gestión del proceso de dunning (cobro) — spec 134 §6
  jaraba_billing.dunning:
    class: Drupal\jaraba_billing\Service\DunningService
    arguments:
      - '@jaraba_billing.tenant_subscription'
      - '@entity_type.manager'
      - '@database'
      - '@plugin.manager.mail'
      - '@logger.channel.jaraba_billing'

  # Verificación de acceso a features por plan + add-ons — spec 158 §6.1
  jaraba_billing.feature_access:
    class: Drupal\jaraba_billing\Service\FeatureAccessService
    arguments:
      - '@jaraba_billing.plan_validator'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@?jaraba_addons.tenant_vertical'

  # ===========================================
  # USAGE METERING — GAP-C04 Stripe Metered Billing
  # ===========================================

  # GAP-C04: Sincroniza registros de uso con Stripe Metered Billing API.
  # Invocado desde hook_cron() diariamente.
  jaraba_billing.usage_stripe_sync:
    class: Drupal\jaraba_billing\Service\UsageStripeSyncService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@?jaraba_foc.stripe_connect'

  # ===========================================
  # FISCAL INVOICE DELEGATION — FASE 11 (F11-5)
  # ===========================================

  # Delegacion de facturas finalizadas al stack fiscal correspondiente.
  # Detecta tipo (B2G/B2B/nacional) y delega a VeriFactu + Facturae/E-Factura.
  # Servicios opcionales de modulos fiscales inyectados condicionalmente
  # via JarabaBillingServiceProvider cuando los modulos estan instalados.
  jaraba_billing.fiscal_delegation:
    class: Drupal\jaraba_billing\Service\FiscalInvoiceDelegationService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - ~
      - ~
      - ~

  # =====================================================================
  # RedsysGatewayService: Integración Redsys API para Bizum
  # Responsabilidad: firma HMAC-SHA256, redirect, callback, Bizum
  # SECRET-MGMT-001: clave via getenv('REDSYS_SECRET_KEY')
  # =====================================================================
  jaraba_billing.redsys_gateway:
    class: Drupal\jaraba_billing\Service\RedsysGatewayService
    arguments:
      - '@logger.channel.jaraba_billing'
      - '@config.factory'

  # ===========================================
  # SETUP WIZARD + DAILY ACTIONS — Métodos de pago
  # ===========================================

  # Setup Wizard step: Métodos de pago (GAP pagos rápidos)
  jaraba_billing.setup_wizard.payment_methods:
    class: Drupal\jaraba_billing\SetupWizard\PaymentMethodsStep
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # Daily Action: Revisar métodos de pago
  jaraba_billing.daily_action.review_payment_methods:
    class: Drupal\jaraba_billing\DailyActions\ReviewPaymentMethodsAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # ===========================================
  # KIT DIGITAL — Servicio + Setup Wizard + Daily Actions
  # ===========================================

  jaraba_billing.kit_digital:
    class: Drupal\jaraba_billing\Service\KitDigitalService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_billing'
      - '@current_user'
      - '@datetime.time'

  # Setup Wizard step: Acuerdos Kit Digital
  jaraba_billing.setup_wizard.kit_digital_agreement:
    class: Drupal\jaraba_billing\SetupWizard\KitDigitalAgreementStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # Daily Action: Justificaciones Kit Digital pendientes
  jaraba_billing.daily_action.kit_digital_pending:
    class: Drupal\jaraba_billing\DailyActions\KitDigitalPendingAction
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # Daily Action: Bonos Kit Digital próximos a expirar
  jaraba_billing.daily_action.kit_digital_expiring:
    class: Drupal\jaraba_billing\DailyActions\KitDigitalExpiringAction
    arguments:
      - '@entity_type.manager'
      - '@datetime.time'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # ===========================================
  # PAUSE + WIN-BACK — Retención clase mundial (Fase 4)
  # ===========================================

  # Pausa de suscripción (1-3 meses) — salva 15-25% cancelaciones.
  # Stripe pause_collection nativo + State API para tracking.
  jaraba_billing.pause_subscription:
    class: Drupal\jaraba_billing\Service\PauseSubscriptionService
    arguments:
      - '@entity_type.manager'
      - '@state'
      - '@logger.channel.jaraba_billing'
      - '@?jaraba_billing.stripe_subscription'

  # Win-back email campaign (4 touches en 90 días).
  # Recupera 8-15% churned users. Patrón QUIZ-FOLLOWUP-DRIP-001.
  jaraba_billing.winback_campaign:
    class: Drupal\jaraba_billing\Service\WinBackCampaignService
    arguments:
      - '@entity_type.manager'
      - '@plugin.manager.mail'
      - '@state'
      - '@logger.channel.jaraba_billing'
