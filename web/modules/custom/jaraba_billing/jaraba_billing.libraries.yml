# STRIPE-CHECKOUT-001 §5.4: Stripe Embedded Checkout JS.
# Stripe.js CDN is loaded dynamically in the behavior (PCI compliance requirement).
stripe-checkout:
  version: 1.x
  js:
    js/stripe-checkout.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings
    - core/once

revenue-dashboard:
  version: 1.x
  css:
    theme:
      css/revenue-dashboard.css: {}
  js:
    https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js:
      type: external
      minified: true
    js/revenue-dashboard.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings
    - core/once
