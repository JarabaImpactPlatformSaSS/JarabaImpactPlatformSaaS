services:
  logger.channel.jaraba_candidate:
    parent: logger.channel_base
    arguments: ['jaraba_candidate']

  # ============================================================================
  # SERVICIOS PRINCIPALES DE CANDIDATO
  # ============================================================================

  jaraba_candidate.profile:
    class: Drupal\jaraba_candidate\Service\CandidateProfileService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@database'
      - '@logger.factory'

  jaraba_candidate.cv_builder:
    class: Drupal\jaraba_candidate\Service\CvBuilderService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_candidate.profile'
      - '@renderer'
      - '@file_system'
      - '@logger.factory'
      - '@?ecosistema_jaraba_core.tenant_context'

  jaraba_candidate.skills:
    class: Drupal\jaraba_candidate\Service\SkillsService
    arguments:
      - '@entity_type.manager'
      - '@database'

  jaraba_candidate.profile_completion:
    class: Drupal\jaraba_candidate\Service\ProfileCompletionService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_candidate.profile'

  jaraba_candidate.import:
    class: Drupal\jaraba_candidate\Service\LinkedInImportService
    arguments:
      - '@http_client'
      - '@jaraba_candidate.profile'

  # GAP-AUD-018: AI-powered skill inference from unstructured text.
  jaraba_candidate.skill_inference:
    class: Drupal\jaraba_candidate\Service\SkillInferenceService
    arguments:
      - '@jaraba_candidate.skills'
      - '@?logger.channel.jaraba_ai_agents'
      - '@?jaraba_ai_agents.smart_marketing_agent'
      - '@?jaraba_rag.embedding_service'

  # ============================================================================
  # AGENTES IA
  # ============================================================================

  jaraba_candidate.agent.career_coach:
    class: Drupal\jaraba_candidate\Agent\CareerCoachAgent
    arguments:
      - '@jaraba_candidate.profile'
      - '@current_user'

  # Copilot IA de empleabilidad con 6 modos (Spec 20260120b S10)
  # Gen 1 — deprecated, delegating to Smart Gen 2 agent
  jaraba_candidate.agent.employability_copilot:
    class: Drupal\jaraba_candidate\Agent\EmployabilityCopilotAgent
    arguments:
      - '@?ai.provider'
      - '@config.factory'
      - '@?logger.channel.jaraba_ai_agents'
      - '@?jaraba_ai_agents.tenant_brand_voice'
      - '@?jaraba_ai_agents.observability'
      - '@?ecosistema_jaraba_core.unified_prompt_builder'

  # S5-01: Smart Gen 2 agent — model routing, memory, observability, brand voice
  jaraba_candidate.agent.smart_employability_copilot:
    class: Drupal\jaraba_candidate\Agent\SmartEmployabilityCopilotAgent
    arguments:
      - '@?ai.provider'
      - '@config.factory'
      - '@?logger.channel.jaraba_ai_agents'
      - '@?jaraba_ai_agents.tenant_brand_voice'
      - '@?jaraba_ai_agents.observability'
      - '@?jaraba_ai_agents.model_router'
      - '@?ecosistema_jaraba_core.unified_prompt_builder'
      - '@?jaraba_ai_agents.tool_registry'
      - '@?jaraba_ai_agents.provider_fallback'
      - '@?jaraba_ai_agents.context_window_manager'
    calls:
      - [setCostAlertService, ['@?ecosistema_jaraba_core.cost_alert']]

  # ============================================================================
  # SERVICIO DE INSIGHTS DE COPILOT (AUTOAPRENDIZAJE IA)
  # ============================================================================

  jaraba_candidate.copilot_insights:
    class: Drupal\jaraba_candidate\Service\CopilotInsightsService
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@current_user'
      - '@logger.factory'

  # ============================================================================
  # BREADCRUMBS
  # ============================================================================

  # ============================================================================
  # COPILOT BRIDGE: Contexto vertical Empleabilidad para Copilot IA
  # ============================================================================

  jaraba_candidate.copilot_bridge:
    class: Drupal\jaraba_candidate\Service\EmpleabilidadCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_candidate'

  jaraba_candidate.breadcrumb:
    class: Drupal\jaraba_candidate\Breadcrumb\CandidateBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder, priority: 100 }

  # =========================================================================
  # Setup Wizard Steps — SETUP-WIZARD-DAILY-001 (Candidato)
  # =========================================================================

  jaraba_candidate.setup_wizard.perfil:
    class: Drupal\jaraba_candidate\SetupWizard\CandidatoPerfilStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_candidate.setup_wizard.experiencia:
    class: Drupal\jaraba_candidate\SetupWizard\CandidatoExperienciaStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_candidate.setup_wizard.formacion:
    class: Drupal\jaraba_candidate\SetupWizard\CandidatoFormacionStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_candidate.setup_wizard.habilidades:
    class: Drupal\jaraba_candidate\SetupWizard\CandidatoHabilidadesStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_candidate.setup_wizard.idiomas:
    class: Drupal\jaraba_candidate\SetupWizard\CandidatoIdiomasStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # =========================================================================
  # Daily Actions — SETUP-WIZARD-DAILY-001 (Candidato)
  # =========================================================================

  jaraba_candidate.daily_action.ofertas:
    class: Drupal\jaraba_candidate\DailyActions\BuscarOfertasAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_candidate.daily_action.cv:
    class: Drupal\jaraba_candidate\DailyActions\ActualizarCvAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_candidate.daily_action.candidaturas:
    class: Drupal\jaraba_candidate\DailyActions\VerCandidaturasAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_candidate.daily_action.copilot:
    class: Drupal\jaraba_candidate\DailyActions\ChatCopilotCandidatoAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # Sprint H — SPEC-CAT-015: GroundingProvider para Empleabilidad
  jaraba_candidate.grounding_provider:
    class: Drupal\jaraba_candidate\Grounding\CandidateGroundingProvider
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.grounding_provider }
