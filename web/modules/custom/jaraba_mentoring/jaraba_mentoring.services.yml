services:
  jaraba_mentoring.mentor_matching:
    class: Drupal\jaraba_mentoring\Service\MentorMatchingService
    arguments: ['@entity_type.manager', '@database']

  jaraba_mentoring.session_scheduler:
    class: Drupal\jaraba_mentoring\Service\SessionSchedulerService
    arguments: ['@entity_type.manager', '@datetime.time']

  jaraba_mentoring.stripe_connect:
    class: Drupal\jaraba_mentoring\Service\StripeConnectService
    arguments: ['@?jaraba_foc.stripe_connect', '@logger.channel.jaraba_mentoring']

  jaraba_mentoring.video_meeting:
    class: Drupal\jaraba_mentoring\Service\VideoMeetingService
    arguments: ['@config.factory', '@http_client']

  logger.channel.jaraba_mentoring:
    parent: logger.channel_base
    arguments: ['jaraba_mentoring']

  jaraba_mentoring.breadcrumb:
    class: Drupal\jaraba_mentoring\Breadcrumb\MentoringBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder, priority: 100 }

  # =========================================================================
  # Setup Wizard Steps — SETUP-WIZARD-DAILY-001 (Mentor)
  # =========================================================================

  jaraba_mentoring.setup_wizard.perfil:
    class: Drupal\jaraba_mentoring\SetupWizard\MentorPerfilStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_mentoring.setup_wizard.disponibilidad:
    class: Drupal\jaraba_mentoring\SetupWizard\MentorDisponibilidadStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_mentoring.setup_wizard.sesion:
    class: Drupal\jaraba_mentoring\SetupWizard\MentorPrimeraSesionStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # =========================================================================
  # Daily Actions — SETUP-WIZARD-DAILY-001 (Mentor)
  # =========================================================================

  jaraba_mentoring.daily_action.sesiones_pendientes:
    class: Drupal\jaraba_mentoring\DailyActions\MentorSesionesPendientesAction
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_mentoring.daily_action.nueva_sesion:
    class: Drupal\jaraba_mentoring\DailyActions\MentorNuevaSesionAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_mentoring.daily_action.resenas:
    class: Drupal\jaraba_mentoring\DailyActions\MentorResenasAction
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_mentoring.daily_action.estadisticas:
    class: Drupal\jaraba_mentoring\DailyActions\MentorEstadisticasAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }
