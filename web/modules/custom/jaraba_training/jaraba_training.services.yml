services:
  jaraba_training.ladder_service:
    class: Drupal\jaraba_training\Service\LadderService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@?jaraba_training.upsell_engine'

  jaraba_training.upsell_engine:
    class: Drupal\jaraba_training\Service\UpsellEngine
    arguments:
      - '@entity_type.manager'
      - '@plugin.manager.mail'
      - '@queue'

  jaraba_training.royalty_tracker:
    class: Drupal\jaraba_training\Service\RoyaltyTracker
    arguments:
      - '@entity_type.manager'
      - '@database'

  # Servicio de orquestacion de compra (TRN-001)
  jaraba_training.purchase_service:
    class: Drupal\jaraba_training\Service\PurchaseService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@jaraba_training.ladder_service'
      - '@logger.channel.default'

  # Rúbrica del Método Jaraba — 4 competencias, cálculo nivel global.
  jaraba_training.method_rubric:
    class: Drupal\jaraba_training\Service\MethodRubricService
    arguments:
      - '@logger.channel.default'

  # === Setup Wizard Steps (SETUP-WIZARD-DAILY-001) ===
  jaraba_training.wizard.configurar_rubrica:
    class: Drupal\jaraba_training\SetupWizard\ConfigurarRubricaStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_training.wizard.asignar_evaluador:
    class: Drupal\jaraba_training\SetupWizard\AsignarEvaluadorStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_training.wizard.definir_precios:
    class: Drupal\jaraba_training\SetupWizard\DefinirPreciosStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # === Daily Actions (SETUP-WIZARD-DAILY-001) ===
  jaraba_training.daily.evaluaciones_pendientes:
    class: Drupal\jaraba_training\DailyActions\EvaluacionesPendientesAction
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_training.daily.renovaciones_proximas:
    class: Drupal\jaraba_training\DailyActions\RenovacionesProximasAction
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_training.daily.nuevas_solicitudes:
    class: Drupal\jaraba_training\DailyActions\NuevasSolicitudesAction
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # Renovación de certificaciones (CERT-05).
  jaraba_training.certification_renewal:
    class: Drupal\jaraba_training\EventSubscriber\CertificationRenewalSubscriber
    arguments:
      - '@entity_type.manager'
      - '@plugin.manager.mail'
      - '@config.factory'
      - '@logger.channel.default'

  # === AI Coverage (AI-COVERAGE-001) ===
  jaraba_training.copilot_bridge:
    class: Drupal\jaraba_training\Service\CertificacionCopilotBridgeService
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.copilot_bridge }

  jaraba_training.grounding_provider:
    class: Drupal\jaraba_training\Grounding\CertificacionGroundingProvider
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.grounding_provider }
