services:
  jaraba_business_tools.canvas_service:
    class: Drupal\jaraba_business_tools\Service\CanvasService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@logger.factory'

  jaraba_business_tools.canvas_ai_service:
    class: Drupal\jaraba_business_tools\Service\CanvasAiService
    arguments:
      - '@config.factory'
      - '@http_client'
      - '@logger.factory'

  jaraba_business_tools.mvp_validation_service:
    class: Drupal\jaraba_business_tools\Service\MvpValidationService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@logger.factory'

  jaraba_business_tools.projection_service:
    class: Drupal\jaraba_business_tools\Service\ProjectionService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@logger.factory'

  jaraba_business_tools.template_service:
    class: Drupal\jaraba_business_tools\Service\CanvasTemplateService
    arguments:
      - '@entity_type.manager'
      - '@config.factory'

  jaraba_business_tools.sroi_calculator:
    class: Drupal\jaraba_business_tools\Service\SroiCalculatorService
    arguments:
      - '@entity_type.manager'
      - '@database'

  jaraba_business_tools.competitor_analysis:
    class: Drupal\jaraba_business_tools\Service\CompetitorAnalysisService
    arguments:
      - '@entity_type.manager'
      - '@http_client_factory'

  jaraba_business_tools.business_copilot:
    class: Drupal\jaraba_business_tools\Agent\BusinessCopilotAgent
    arguments:
      - '@entity_type.manager'
      - '@current_user'

  # Copilot Bridge: Contexto vertical Emprendimiento para Copilot IA
  jaraba_business_tools.copilot_bridge:
    class: Drupal\jaraba_business_tools\Service\EmprendimientoCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.default'

  jaraba_business_tools.breadcrumb:
    class: Drupal\jaraba_business_tools\Breadcrumb\BusinessToolsBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder, priority: 100 }

  # =========================================================================
  # Setup Wizard Steps — SETUP-WIZARD-DAILY-001 (Entrepreneur)
  # =========================================================================

  jaraba_business_tools.setup_wizard.perfil:
    class: Drupal\jaraba_business_tools\SetupWizard\EntrepreneurPerfilStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_business_tools.setup_wizard.diagnostico:
    class: Drupal\jaraba_business_tools\SetupWizard\EntrepreneurDiagnosticoStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_business_tools.setup_wizard.canvas:
    class: Drupal\jaraba_business_tools\SetupWizard\EntrepreneurCanvasStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # =========================================================================
  # Daily Actions — SETUP-WIZARD-DAILY-001 (Entrepreneur)
  # =========================================================================

  jaraba_business_tools.daily_action.canvas:
    class: Drupal\jaraba_business_tools\DailyActions\EntrepreneurCanvasAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_business_tools.daily_action.aprendizaje:
    class: Drupal\jaraba_business_tools\DailyActions\EntrepreneurAprendizajeAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_business_tools.daily_action.herramientas:
    class: Drupal\jaraba_business_tools\DailyActions\EntrepreneurHerramientasAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_business_tools.daily_action.kpis:
    class: Drupal\jaraba_business_tools\DailyActions\EntrepreneurKpisAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # GroundingProvider: busqueda contenido para copilot IA
  jaraba_business_tools.grounding_provider:
    class: Drupal\jaraba_business_tools\Grounding\BusinessCanvasGroundingProvider
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.grounding_provider }

