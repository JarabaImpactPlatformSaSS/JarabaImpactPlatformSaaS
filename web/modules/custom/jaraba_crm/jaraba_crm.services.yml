services:
  # Canal de log del modulo CRM.
  logger.channel.jaraba_crm:
    parent: logger.channel_base
    arguments: ['jaraba_crm']

  jaraba_crm.company:
    class: Drupal\jaraba_crm\Service\CompanyService
    arguments: ['@entity_type.manager']

  jaraba_crm.contact:
    class: Drupal\jaraba_crm\Service\ContactService
    arguments: ['@entity_type.manager']

  jaraba_crm.opportunity:
    class: Drupal\jaraba_crm\Service\OpportunityService
    arguments: ['@entity_type.manager']

  jaraba_crm.activity:
    class: Drupal\jaraba_crm\Service\ActivityService
    arguments: ['@entity_type.manager']

  # Servicio de gestion de etapas del pipeline.
  jaraba_crm.pipeline_stage:
    class: Drupal\jaraba_crm\Service\PipelineStageService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_crm'

  # Sales Playbook — acciones recomendadas por etapa + BANT (Doc 186).
  jaraba_crm.sales_playbook:
    class: Drupal\jaraba_crm\Service\SalesPlaybookService
    arguments:
      - '@jaraba_crm.opportunity'
      - '@logger.channel.jaraba_crm'

  # ===========================================
  # GAP-CRM: External CRM connectors (plugin system)
  # ===========================================

  # Orchestrator: resolves active connector, delegates sync.
  jaraba_crm.sync_orchestrator:
    class: Drupal\jaraba_crm\Service\CrmSyncOrchestratorService
    arguments:
      - '@logger.channel.jaraba_crm'
    calls:
      - [addConnector, ['@jaraba_crm.connector.hubspot']]
      - [addConnector, ['@jaraba_crm.connector.salesforce']]

  # HubSpot connector (API v3).
  jaraba_crm.connector.hubspot:
    class: Drupal\jaraba_crm\Service\HubSpotConnector
    arguments:
      - '@entity_type.manager'
      - '@http_client'
      - '@logger.channel.jaraba_crm'

  # Salesforce connector (REST API v59).
  jaraba_crm.connector.salesforce:
    class: Drupal\jaraba_crm\Service\SalesforceConnector
    arguments:
      - '@entity_type.manager'
      - '@http_client'
      - '@logger.channel.jaraba_crm'

  # Servicio de forecasting y metricas de ventas.
  jaraba_crm.forecasting:
    class: Drupal\jaraba_crm\Service\CrmForecastingService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_crm.opportunity'
      - '@jaraba_crm.pipeline_stage'
      - '@logger.channel.jaraba_crm'
      - '@cache.default'

  # =========================================================================
  # AI Integration — CopilotBridge + GroundingProviders (AI-COVERAGE-001)
  # =========================================================================

  # CRM Copilot Bridge — enriches copilot with CRM pipeline data.
  # Registered manually in jaraba_copilot_v2 bridge_registry (NO tag).
  jaraba_crm.copilot_bridge:
    class: Drupal\jaraba_crm\Service\CrmCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_crm'
      - '@jaraba_crm.opportunity'
      - '@jaraba_crm.contact'
      - '@jaraba_crm.forecasting'
      - '@jaraba_crm.sales_playbook'

  # Opportunity Grounding Provider — exposes deals to AI grounding.
  jaraba_crm.grounding_provider.opportunity:
    class: Drupal\jaraba_crm\Grounding\OpportunityGroundingProvider
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.grounding_provider }

  # Contact Grounding Provider — exposes contacts to AI grounding.
  jaraba_crm.grounding_provider.contact:
    class: Drupal\jaraba_crm\Grounding\ContactGroundingProvider
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: jaraba_copilot_v2.grounding_provider }
