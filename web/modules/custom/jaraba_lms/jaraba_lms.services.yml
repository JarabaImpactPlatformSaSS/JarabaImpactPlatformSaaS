services:
  # ============================================================================
  # SERVICIOS PRINCIPALES DEL LMS
  # ============================================================================

  jaraba_lms.course:
    class: Drupal\jaraba_lms\Service\CourseService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@database'
      - '@logger.factory'

  jaraba_lms.enrollment:
    class: Drupal\jaraba_lms\Service\EnrollmentService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@jaraba_lms.course'
      - '@jaraba_lms.progress'
      - '@logger.factory'
      - '@event_dispatcher'

  jaraba_lms.progress:
    class: Drupal\jaraba_lms\Service\ProgressTrackingService
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.factory'

  jaraba_lms.learning_path:
    class: Drupal\jaraba_lms\Service\LearningPathService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_lms.course'
      - '@logger.factory'

  jaraba_lms.certification:
    class: Drupal\jaraba_lms\Service\CertificationService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_lms.enrollment'

  jaraba_lms.xapi:
    class: Drupal\jaraba_lms\Service\XApiService
    arguments:
      - '@http_client'
      - '@config.factory'

  # ============================================================================
  # AGENTES IA
  # ============================================================================

  # Gen 2 Learning Path Agent (S3-04: HAL-AI-07).
  # Replaces LearningTutorAgent with SmartBaseAgent + Model Routing + AI calls.
  jaraba_lms.agent.learning_path:
    class: Drupal\jaraba_lms\Agent\LearningPathAgent
    arguments:
      - '@?ai.provider'
      - '@config.factory'
      - '@logger.channel.jaraba_lms'
      - '@?jaraba_ai_agents.tenant_brand_voice'
      - '@?jaraba_ai_agents.observability'
      - '@?jaraba_ai_agents.model_router'
      - '@jaraba_lms.enrollment'
      - '@jaraba_lms.course'
      - '@?ecosistema_jaraba_core.unified_prompt_builder'
      - '@?jaraba_ai_agents.tool_registry'
      - '@?jaraba_ai_agents.provider_fallback'
      - '@?jaraba_ai_agents.context_window_manager'
    calls:
      - [setLongTermMemory, ['@?jaraba_agents.long_term_memory']]

  # Legacy tutor agent (deprecated — use jaraba_lms.agent.learning_path).
  jaraba_lms.agent.learning_tutor:
    class: Drupal\jaraba_lms\Agent\LearningTutorAgent
    arguments:
      - '@jaraba_lms.enrollment'
      - '@current_user'

  # ============================================================================
  # SERVICIOS DE BADGES Y GAMIFICACIÓN (Q1 2026)
  # ============================================================================

  jaraba_lms.open_badge:
    class: Drupal\jaraba_lms\Service\OpenBadgeService
    arguments:
      - '@entity_type.manager'
      - '@file_system'
      - '@logger.factory'

  jaraba_lms.gamification:
    class: Drupal\jaraba_lms\Service\GamificationService
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.factory'

  # ============================================================================
  # DIAGNÓSTICO EXPRESS Y AUTO-ENROLLMENT (ECA-LMS-001)
  # ============================================================================

  jaraba_lms.diagnostic_enrollment:
    class: Drupal\jaraba_lms\Service\DiagnosticEnrollmentService
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_lms'

  logger.channel.jaraba_lms:
    parent: logger.channel_base
    arguments: ['jaraba_lms']


  # FIX-048: Adaptive Learning Service
  jaraba_lms.adaptive_learning:
    class: Drupal\jaraba_lms\Service\AdaptiveLearningService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_lms'
      - '@?jaraba_ai_agents.smart_marketing_agent'

  # Copilot Bridge: Contexto vertical Formacion para Copilot IA
  jaraba_lms.copilot_bridge:
    class: Drupal\jaraba_lms\Service\FormacionCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_lms'

  # =========================================================================
  # Setup Wizard Steps — SETUP-WIZARD-DAILY-001 (Instructor LMS)
  # =========================================================================

  jaraba_lms.setup_wizard.curso:
    class: Drupal\jaraba_lms\SetupWizard\InstructorCursoStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_lms.setup_wizard.leccion:
    class: Drupal\jaraba_lms\SetupWizard\InstructorLeccionStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_lms.setup_wizard.publicar:
    class: Drupal\jaraba_lms\SetupWizard\InstructorPublicarStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # =========================================================================
  # Daily Actions — SETUP-WIZARD-DAILY-001 (Instructor LMS)
  # =========================================================================

  jaraba_lms.daily_action.alumnos:
    class: Drupal\jaraba_lms\DailyActions\GestionarAlumnosAction
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_lms.daily_action.nueva_leccion:
    class: Drupal\jaraba_lms\DailyActions\NuevaLeccionAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_lms.daily_action.resenas:
    class: Drupal\jaraba_lms\DailyActions\VerResenasLmsAction
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_lms.daily_action.analiticas:
    class: Drupal\jaraba_lms\DailyActions\AnaliticasCursoAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  # =========================================================================
  # Setup Wizard Steps — SETUP-WIZARD-DAILY-001 (Learner LMS)
  # =========================================================================

  jaraba_lms.setup_wizard.learner_perfil:
    class: Drupal\jaraba_lms\SetupWizard\LearnerPerfilStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_lms.setup_wizard.learner_curso:
    class: Drupal\jaraba_lms\SetupWizard\LearnerPrimerCursoStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_lms.setup_wizard.learner_leccion:
    class: Drupal\jaraba_lms\SetupWizard\LearnerPrimeraLeccionStep
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  # =========================================================================
  # Daily Actions — SETUP-WIZARD-DAILY-001 (Learner LMS)
  # =========================================================================

  jaraba_lms.daily_action.learner_continuar:
    class: Drupal\jaraba_lms\DailyActions\LearnerContinuarCursoAction
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_lms.daily_action.learner_explorar:
    class: Drupal\jaraba_lms\DailyActions\LearnerExplorarCataAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_lms.daily_action.learner_certificados:
    class: Drupal\jaraba_lms\DailyActions\LearnerCertificadosAction
    arguments:
      - '@entity_type.manager'
      - '@current_user'
    tags:
      - { name: ecosistema_jaraba_core.daily_action }

  jaraba_lms.daily_action.learner_resenas:
    class: Drupal\jaraba_lms\DailyActions\LearnerResenasAction
    tags:
      - { name: ecosistema_jaraba_core.daily_action }
