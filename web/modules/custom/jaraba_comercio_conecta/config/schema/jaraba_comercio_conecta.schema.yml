jaraba_comercio_conecta.settings:
  type: config_object
  label: 'ComercioConecta settings'
  mapping:
    orders_per_page:
      type: integer
      label: 'Orders per page'
    search_results_per_page:
      type: integer
      label: 'Search results per page'
    flash_offers_per_page:
      type: integer
      label: 'Flash offers per page'
    reviews_per_page:
      type: integer
      label: 'Reviews per page'
    notifications_per_page:
      type: integer
      label: 'Notifications per page'
    merchant_orders_per_page:
      type: integer
      label: 'Merchant orders per page'
    nearby_radius_default:
      type: integer
      label: 'Default nearby search radius (km)'

jaraba_comercio_conecta.commission.*:
  type: config_entity
  label: 'Marketplace Commission Config'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
    tenant_id:
      type: integer
      label: 'Tenant ID'
    default_rate:
      type: float
      label: 'Default commission rate'
    category_rates:
      type: sequence
      label: 'Category-specific rates'
      sequence:
        type: float
        label: 'Rate'
    min_rate:
      type: float
      label: 'Minimum rate'
    max_rate:
      type: float
      label: 'Maximum rate'
    platform_fee:
      type: float
      label: 'Platform fee per transaction'
