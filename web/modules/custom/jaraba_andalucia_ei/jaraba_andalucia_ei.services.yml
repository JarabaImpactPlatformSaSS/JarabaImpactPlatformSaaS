services:
  jaraba_andalucia_ei.ai_mentorship_tracker:
    class: Drupal\jaraba_andalucia_ei\Service\AiMentorshipTracker
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@config.factory'
      - '@datetime.time'
      - '@?jaraba_andalucia_ei.documento_revision_ia'
      - '@?jaraba_andalucia_ei.adaptive_difficulty'
      - '@?jaraba_andalucia_ei.mensajeria_integration'

  jaraba_andalucia_ei.sto_export:
    class: Drupal\jaraba_andalucia_ei\Service\StoExportService
    arguments:
      - '@entity_type.manager'
      - '@?jaraba_sepe_teleformacion.soap_service'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@config.factory'

  jaraba_andalucia_ei.fase_transition_manager:
    class: Drupal\jaraba_andalucia_ei\Service\FaseTransitionManager
    arguments:
      - '@entity_type.manager'
      - '@event_dispatcher'
      - '@logger.channel.jaraba_andalucia_ei'

  logger.channel.jaraba_andalucia_ei:
    parent: logger.channel_base
    arguments: ['jaraba_andalucia_ei']

  jaraba_andalucia_ei.solicitud_triage:
    class: Drupal\jaraba_andalucia_ei\Service\SolicitudTriageService
    arguments:
      - '@?ai.provider'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.expediente:
    class: Drupal\jaraba_andalucia_ei\Service\ExpedienteService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@?jaraba_legal_vault.document_vault'
      - '@?ecosistema_jaraba_core.firma_digital'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.documento_revision_ia:
    class: Drupal\jaraba_andalucia_ei\Service\DocumentoRevisionIaService
    arguments:
      - '@entity_type.manager'
      - '@?ai.provider'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.informe_progreso_pdf:
    class: Drupal\jaraba_andalucia_ei\Service\InformeProgresoPdfService
    arguments:
      - '@entity_type.manager'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@jaraba_andalucia_ei.expediente'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.copilot_context_provider:
    class: Drupal\jaraba_andalucia_ei\Service\AndaluciaEiCopilotContextProvider
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@jaraba_andalucia_ei.expediente'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.adaptive_difficulty:
    class: Drupal\jaraba_andalucia_ei\Service\AdaptiveDifficultyEngine
    arguments:
      - '@entity_type.manager'
      - '@datetime.time'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.mensajeria_integration:
    class: Drupal\jaraba_andalucia_ei\Service\MensajeriaIntegrationService
    arguments:
      - '@entity_type.manager'
      - '@?jaraba_messaging.messaging'
      - '@logger.channel.jaraba_andalucia_ei'

  # Copilot Bridge: Contexto vertical Andalucia EI para Copilot IA
  jaraba_andalucia_ei.copilot_bridge:
    class: Drupal\jaraba_andalucia_ei\Service\AndaluciaEiCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.copilot_context_provider'

  jaraba_andalucia_ei.expediente_completeness:
    class: Drupal\jaraba_andalucia_ei\Service\ExpedienteCompletenessService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.hoja_servicio_mentoria:
    class: Drupal\jaraba_andalucia_ei\Service\HojaServicioMentoriaService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.human_mentorship_tracker:
    class: Drupal\jaraba_andalucia_ei\Service\HumanMentorshipTracker
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.participante_access_check:
    class: Drupal\jaraba_andalucia_ei\Access\ParticipanteAccessCheck
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: access_check, applies_to: _participante_access }

  # Hub Coordinador: logica de negocio del hub operativo
  jaraba_andalucia_ei.coordinador_hub:
    class: Drupal\jaraba_andalucia_ei\Service\CoordinadorHubService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.fase_transition_manager'

  # DACI: Documento de Aceptacion de Compromisos e Informacion
  jaraba_andalucia_ei.daci:
    class: Drupal\jaraba_andalucia_ei\Service\DaciService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # Recibo de Servicio universal para todas las actuaciones
  jaraba_andalucia_ei.recibo_servicio:
    class: Drupal\jaraba_andalucia_ei\Service\ReciboServicioService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # Actuaciones STO: logica de negocio de actuaciones del itinerario
  jaraba_andalucia_ei.actuacion_sto:
    class: Drupal\jaraba_andalucia_ei\Service\ActuacionStoService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Alertas normativas: deteccion de riesgos de incumplimiento
  jaraba_andalucia_ei.alertas_normativas:
    class: Drupal\jaraba_andalucia_ei\Service\AlertasNormativasService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Calendario y temporalizacion del programa
  jaraba_andalucia_ei.calendario_programa:
    class: Drupal\jaraba_andalucia_ei\Service\CalendarioProgramaService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # UserProfile Section: Andalucia +ei — detecta roles del programa
  jaraba_andalucia_ei.user_profile_section.andalucia_ei:
    class: Drupal\jaraba_andalucia_ei\UserProfile\AndaluciaEiUserProfileSection
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@?ecosistema_jaraba_core.tenant_context'
    tags:
      - { name: ecosistema_jaraba_core.user_profile_section }
