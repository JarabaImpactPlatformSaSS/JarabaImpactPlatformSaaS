services:
  jaraba_andalucia_ei.ai_mentorship_tracker:
    class: Drupal\jaraba_andalucia_ei\Service\AiMentorshipTracker
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@config.factory'
      - '@datetime.time'
      - '@?jaraba_andalucia_ei.documento_revision_ia'
      - '@?jaraba_andalucia_ei.adaptive_difficulty'
      - '@?jaraba_andalucia_ei.mensajeria_integration'

  jaraba_andalucia_ei.sto_export:
    class: Drupal\jaraba_andalucia_ei\Service\StoExportService
    arguments:
      - '@entity_type.manager'
      - '@?jaraba_sepe_teleformacion.soap_service'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@config.factory'

  # Sprint 17: STO bidireccional (push + pull + reconciliación)
  jaraba_andalucia_ei.sto_bidireccional:
    class: Drupal\jaraba_andalucia_ei\Service\StoBidireccionalService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@config.factory'
      - '@?jaraba_andalucia_ei.sto_export'

  jaraba_andalucia_ei.fase_transition_manager:
    class: Drupal\jaraba_andalucia_ei\Service\FaseTransitionManager
    arguments:
      - '@entity_type.manager'
      - '@event_dispatcher'
      - '@logger.channel.jaraba_andalucia_ei'

  logger.channel.jaraba_andalucia_ei:
    parent: logger.channel_base
    arguments: ['jaraba_andalucia_ei']

  jaraba_andalucia_ei.solicitud_triage:
    class: Drupal\jaraba_andalucia_ei\Service\SolicitudTriageService
    arguments:
      - '@?ai.provider'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.expediente:
    class: Drupal\jaraba_andalucia_ei\Service\ExpedienteService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@?jaraba_legal_vault.document_vault'
      - '@?ecosistema_jaraba_core.firma_digital'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.documento_revision_ia:
    class: Drupal\jaraba_andalucia_ei\Service\DocumentoRevisionIaService
    arguments:
      - '@entity_type.manager'
      - '@?ai.provider'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.informe_progreso_pdf:
    class: Drupal\jaraba_andalucia_ei\Service\InformeProgresoPdfService
    arguments:
      - '@entity_type.manager'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@jaraba_andalucia_ei.expediente'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.copilot_context_provider:
    class: Drupal\jaraba_andalucia_ei\Service\AndaluciaEiCopilotContextProvider
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@jaraba_andalucia_ei.expediente'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?ecosistema_jaraba_core.tenant_context'

  jaraba_andalucia_ei.adaptive_difficulty:
    class: Drupal\jaraba_andalucia_ei\Service\AdaptiveDifficultyEngine
    arguments:
      - '@entity_type.manager'
      - '@datetime.time'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.mensajeria_integration:
    class: Drupal\jaraba_andalucia_ei\Service\MensajeriaIntegrationService
    arguments:
      - '@entity_type.manager'
      - '@?jaraba_messaging.messaging'
      - '@logger.channel.jaraba_andalucia_ei'

  # Copilot Bridge: Contexto vertical Andalucia EI para Copilot IA
  jaraba_andalucia_ei.copilot_bridge:
    class: Drupal\jaraba_andalucia_ei\Service\AndaluciaEiCopilotBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.copilot_context_provider'

  jaraba_andalucia_ei.expediente_completeness:
    class: Drupal\jaraba_andalucia_ei\Service\ExpedienteCompletenessService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.hoja_servicio_mentoria:
    class: Drupal\jaraba_andalucia_ei\Service\HojaServicioMentoriaService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.human_mentorship_tracker:
    class: Drupal\jaraba_andalucia_ei\Service\HumanMentorshipTracker
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  jaraba_andalucia_ei.participante_access_check:
    class: Drupal\jaraba_andalucia_ei\Access\ParticipanteAccessCheck
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: access_check, applies_to: _participante_access }

  # Hub Coordinador: logica de negocio del hub operativo
  jaraba_andalucia_ei.coordinador_hub:
    class: Drupal\jaraba_andalucia_ei\Service\CoordinadorHubService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.fase_transition_manager'
      - '@?jaraba_andalucia_ei.ei_multichannel_notification'

  # Acuerdo de Participacion: documento bilateral (Acuerdo_participacion_ICV25.odt)
  jaraba_andalucia_ei.acuerdo_participacion:
    class: Drupal\jaraba_andalucia_ei\Service\AcuerdoParticipacionService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # DACI: Documento de Aceptacion de Compromisos e Informacion (Anexo_DACI_ICV25.odt)
  # DISTINTO del Acuerdo de Participacion.
  jaraba_andalucia_ei.daci:
    class: Drupal\jaraba_andalucia_ei\Service\DaciService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # Recibo de Servicio universal para todas las actuaciones
  jaraba_andalucia_ei.recibo_servicio:
    class: Drupal\jaraba_andalucia_ei\Service\ReciboServicioService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # Recibi del Incentivo €528 (Recibi_Incentivo_ICV25.odt)
  jaraba_andalucia_ei.incentive_receipt:
    class: Drupal\jaraba_andalucia_ei\Service\IncentiveReceiptService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # Renuncia al Incentivo €528 (Renuncia_Incentivo_ICV25.odt)
  jaraba_andalucia_ei.incentive_waiver:
    class: Drupal\jaraba_andalucia_ei\Service\IncentiveWaiverService
    arguments:
      - '@entity_type.manager'
      - '@jaraba_andalucia_ei.expediente'
      - '@?ecosistema_jaraba_core.branded_pdf'
      - '@logger.channel.jaraba_andalucia_ei'

  # Actuaciones STO: logica de negocio de actuaciones del itinerario
  jaraba_andalucia_ei.actuacion_sto:
    class: Drupal\jaraba_andalucia_ei\Service\ActuacionStoService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Alertas normativas: deteccion de riesgos de incumplimiento
  jaraba_andalucia_ei.alertas_normativas:
    class: Drupal\jaraba_andalucia_ei\Service\AlertasNormativasService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Calendario y temporalizacion del programa
  jaraba_andalucia_ei.calendario_programa:
    class: Drupal\jaraba_andalucia_ei\Service\CalendarioProgramaService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Justificacion economica: calculo de modulos persona atendida/insertada (202.500€)
  jaraba_andalucia_ei.justificacion_economica:
    class: Drupal\jaraba_andalucia_ei\Service\JustificacionEconomicaService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Riesgo de abandono: deteccion temprana y factores de riesgo
  jaraba_andalucia_ei.riesgo_abandono:
    class: Drupal\jaraba_andalucia_ei\Service\RiesgoAbandonoService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Prospeccion empresarial: gestion de contactos con empresas
  jaraba_andalucia_ei.prospeccion:
    class: Drupal\jaraba_andalucia_ei\Service\ProspeccionService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Acceso al programa: elegibilidad y roles de usuario
  jaraba_andalucia_ei.acceso_programa:
    class: Drupal\jaraba_andalucia_ei\Service\AccesoProgramaService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@?ecosistema_jaraba_core.tenant_context'
      - '@logger.channel.jaraba_andalucia_ei'

  # Puntos de impacto: scoring de KPIs y reporting
  jaraba_andalucia_ei.puntos_impacto:
    class: Drupal\jaraba_andalucia_ei\Service\PuntosImpactoEiService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Documento-Firma Orchestrator: mapea categorias a flujos de firma
  # Sprint 3 — Plan Maestro Andalucia +ei Clase Mundial
  jaraba_andalucia_ei.documento_firma_orchestrator:
    class: Drupal\jaraba_andalucia_ei\Service\DocumentoFirmaOrchestrator
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.firma_workflow'

  # Firma Workflow: orquestador del ciclo de vida de firma electronica
  # Sprint 1 — Plan Maestro Andalucia +ei Clase Mundial
  jaraba_andalucia_ei.firma_workflow:
    class: Drupal\jaraba_andalucia_ei\Service\FirmaWorkflowService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@database'
      - '@request_stack'
      - '@?ecosistema_jaraba_core.firma_digital'
      - '@?ecosistema_jaraba_core.tenant_context'
      - '@?jaraba_support.notification'

  # Sprint 7: Puente emprendimiento ↔ business_tools
  jaraba_andalucia_ei.ei_emprendimiento_bridge:
    class: Drupal\jaraba_andalucia_ei\Service\EiEmprendimientoBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_business_tools.canvas'
      - '@?jaraba_business_tools.mvp_validation'
      - '@?jaraba_business_tools.projection'
      - '@?jaraba_business_tools.sroi_calculator'
      - '@?ecosistema_jaraba_core.tenant_context'

  # Sprint 8: Adaptacion itinerario por colectivo y barreras
  jaraba_andalucia_ei.adaptacion_itinerario:
    class: Drupal\jaraba_andalucia_ei\Service\AdaptacionItinerarioService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.riesgo_abandono'
      - '@?ecosistema_jaraba_core.tenant_context'

  # Sprint 9: Matching bidireccional participante ↔ empresa
  jaraba_andalucia_ei.ei_matching_bridge:
    class: Drupal\jaraba_andalucia_ei\Service\EiMatchingBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_matching.matching'
      - '@?jaraba_candidate.profile'
      - '@?jaraba_candidate.skills'
      - '@?ecosistema_jaraba_core.tenant_context'

  # Sprint 10: Red Alumni Viva
  jaraba_andalucia_ei.ei_alumni_bridge:
    class: Drupal\jaraba_andalucia_ei\Service\EiAlumniBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_mentoring.mentor_matching'
      - '@?ecosistema_jaraba_core.tenant_context'

  # Sprint 11: Gamificacion significativa — badges por hitos PIIL
  jaraba_andalucia_ei.ei_badge_bridge:
    class: Drupal\jaraba_andalucia_ei\Service\EiBadgeBridgeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?ecosistema_jaraba_core.badge_award'

  # Sprint 17: Orquestador multicanal (push + WhatsApp + in-app)
  jaraba_andalucia_ei.ei_multichannel_notification:
    class: Drupal\jaraba_andalucia_ei\Service\EiMultichannelNotificationService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.ei_push_notification'
      - '@?jaraba_agroconecta_core.whatsapp'
      - '@?jaraba_notifications.notification'

  # Sprint 12: Push notifications programaticas para firma y programa
  jaraba_andalucia_ei.ei_push_notification:
    class: Drupal\jaraba_andalucia_ei\Service\EiPushNotificationService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_pwa.push'
      - '@?jaraba_support.notification'

  # UserProfile Section: Andalucia +ei — detecta roles del programa
  jaraba_andalucia_ei.user_profile_section.andalucia_ei:
    class: Drupal\jaraba_andalucia_ei\UserProfile\AndaluciaEiUserProfileSection
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@?ecosistema_jaraba_core.tenant_context'
      - '@database'
      - '@logger.channel.jaraba_andalucia_ei'
    tags:
      - { name: ecosistema_jaraba_core.user_profile_section }

  # ===================================================================
  # Sprint 13: Diseño del Programa Formativo
  # ===================================================================

  # Fase 2: Workflow VoBo SAE con máquina de 8 estados
  jaraba_andalucia_ei.vobo_sae_workflow:
    class: Drupal\jaraba_andalucia_ei\Service\VoboSaeWorkflowService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.expediente'

  # Fase 6: Servicio de acciones formativas
  jaraba_andalucia_ei.accion_formativa:
    class: Drupal\jaraba_andalucia_ei\Service\AccionFormativaService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.vobo_sae_workflow'

  # Fase 4: Servicio de sesiones programadas
  jaraba_andalucia_ei.sesion_programada:
    class: Drupal\jaraba_andalucia_ei\Service\SesionProgramadaService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Sprint 17: iCal export feeds para integración calendarios externos
  jaraba_andalucia_ei.ical_export:
    class: Drupal\jaraba_andalucia_ei\Service\ICalExportService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Fase 5: Servicio de inscripciones a sesiones
  jaraba_andalucia_ei.inscripcion_sesion:
    class: Drupal\jaraba_andalucia_ei\Service\InscripcionSesionService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@?jaraba_andalucia_ei.actuacion_sto'

  # Fase 6b: Acceso vertical temporal para participantes del programa
  jaraba_andalucia_ei.programa_vertical_access:
    class: Drupal\jaraba_andalucia_ei\Service\ProgramaVerticalAccessService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@state'

  # Sprint 14: Cómputo de indicadores persona atendida/insertada
  jaraba_andalucia_ei.actuacion_compute:
    class: Drupal\jaraba_andalucia_ei\Service\ActuacionComputeService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'

  # Fase 6c: Indicadores ESF+ para justificación ante financiador
  jaraba_andalucia_ei.indicadores_esf:
    class: Drupal\jaraba_andalucia_ei\Service\IndicadoresEsfService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_andalucia_ei'
      - '@database'

  # =========================================================================
  # Setup Wizard Steps — SETUP-WIZARD-DAILY-001 (Coordinador)
  # =========================================================================

  jaraba_andalucia_ei.setup_wizard.plan_formativo:
    class: Drupal\jaraba_andalucia_ei\SetupWizard\CoordinadorPlanFormativoStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_andalucia_ei.setup_wizard.acciones_formativas:
    class: Drupal\jaraba_andalucia_ei\SetupWizard\CoordinadorAccionesFormativasStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_andalucia_ei.setup_wizard.sesiones:
    class: Drupal\jaraba_andalucia_ei\SetupWizard\CoordinadorSesionesStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }

  jaraba_andalucia_ei.setup_wizard.validacion:
    class: Drupal\jaraba_andalucia_ei\SetupWizard\CoordinadorValidacionStep
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: ecosistema_jaraba_core.setup_wizard_step }
