services:
  # =====================================================================
  # Canal de log dedicado para Jaraba Addons
  # Permite filtrar mensajes del módulo en los logs de Drupal
  # =====================================================================
  logger.channel.jaraba_addons:
    parent: logger.channel_base
    arguments: ['jaraba_addons']

  # =====================================================================
  # AddonCatalogService: Gestión del catálogo de add-ons
  # Responsabilidad: listar add-ons disponibles, filtrar por tipo,
  #   obtener precios, verificar disponibilidad
  # Relaciones: consume Addon entity, TenantContextService
  # =====================================================================
  jaraba_addons.catalog:
    class: Drupal\jaraba_addons\Service\AddonCatalogService
    arguments:
      - '@entity_type.manager'
      - '@?ecosistema_jaraba_core.tenant_context'
      - '@logger.channel.jaraba_addons'

  # =====================================================================
  # TenantVerticalService: Resolución multi-vertical (primario + addons)
  # Responsabilidad: resolver TODOS los verticales activos de un tenant,
  #   combinando el vertical primario (Tenant.vertical) con verticales
  #   contratados como add-ons (AddonSubscription activas tipo 'vertical')
  # Relaciones: consume Tenant, Addon, AddonSubscription entities
  # =====================================================================
  jaraba_addons.tenant_vertical:
    class: Drupal\jaraba_addons\Service\TenantVerticalService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_addons'

  # =====================================================================
  # AddonSubscriptionService: Gestión de suscripciones a add-ons
  # Responsabilidad: suscripción, cancelación, renovación,
  #   consulta de suscripciones por tenant, verificación de actividad
  # Relaciones: consume AddonSubscription entity, Addon entity
  # =====================================================================
  jaraba_addons.subscription:
    class: Drupal\jaraba_addons\Service\AddonSubscriptionService
    arguments:
      - '@entity_type.manager'
      - '@?ecosistema_jaraba_core.tenant_context'
      - '@logger.channel.jaraba_addons'

  # =====================================================================
  # VerticalAddonBillingService: Activacion/desactivacion de verticales
  # Responsabilidad: orquestar suscripcion local + invalidacion de cache
  #   de verticales. Futuro: integracion con Stripe Subscription Items
  # Relaciones: consume AddonSubscriptionService, TenantVerticalService
  # =====================================================================
  jaraba_addons.vertical_billing:
    class: Drupal\jaraba_addons\Service\VerticalAddonBillingService
    arguments:
      - '@jaraba_addons.subscription'
      - '@jaraba_addons.tenant_vertical'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_addons'

  # =====================================================================
  # AddonCompatibilityService: Matriz de compatibilidad addon/vertical
  # Responsabilidad: determinar qué add-ons son compatibles/recomendados
  #   para cada vertical según Doc 158 §4
  # Relaciones: servicio de datos puro, sin dependencias
  # =====================================================================
  jaraba_addons.addon_compatibility:
    class: Drupal\jaraba_addons\Service\AddonCompatibilityService
