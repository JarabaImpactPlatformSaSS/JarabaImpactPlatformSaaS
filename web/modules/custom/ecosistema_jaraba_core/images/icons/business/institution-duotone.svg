<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Duotone fill: pediment (triangular roof) -->
  <path d="M2 9L12 3L22 9H2Z" fill="currentColor" opacity="0.25"/>
  <!-- Pediment outline -->
  <path d="M2 9L12 3L22 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Columns duotone fill -->
  <rect x="5" y="9" width="2" height="10" fill="currentColor" opacity="0.15"/>
  <rect x="11" y="9" width="2" height="10" fill="currentColor" opacity="0.15"/>
  <rect x="17" y="9" width="2" height="10" fill="currentColor" opacity="0.15"/>
  <!-- Columns strokes -->
  <line x1="6" y1="9" x2="6" y2="19" stroke="currentColor" stroke-width="2"/>
  <line x1="12" y1="9" x2="12" y2="19" stroke="currentColor" stroke-width="2"/>
  <line x1="18" y1="9" x2="18" y2="19" stroke="currentColor" stroke-width="2"/>
  <!-- Base / Steps -->
  <path d="M3 19H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M1 21H23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>
