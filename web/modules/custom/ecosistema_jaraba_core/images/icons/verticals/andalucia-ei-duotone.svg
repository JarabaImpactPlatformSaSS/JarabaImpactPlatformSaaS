<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Duotone fill: person silhouette -->
  <circle cx="8" cy="4.5" r="2.5" fill="currentColor" opacity="0.25"/>
  <path d="M5 12a4 4 0 0 0-4 4v2h14v-2a4 4 0 0 0-4-4H5z" fill="currentColor" opacity="0.25"/>
  <!-- Duotone fill: compass background -->
  <circle cx="18.5" cy="8" r="4.5" fill="currentColor" opacity="0.15"/>
  <!-- Person head -->
  <circle cx="8" cy="4.5" r="2.5" stroke="currentColor" stroke-width="2"/>
  <!-- Person body -->
  <path d="M3 18v-2a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Compass circle -->
  <circle cx="18.5" cy="8" r="4.5" stroke="currentColor" stroke-width="2"/>
  <!-- Compass tick marks -->
  <path d="M18.5 4.5v1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M18.5 10v1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M15 8h1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M20.5 8h1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Compass diamond pointer (north=filled) -->
  <path d="M18.5 5.5l1.2 2.5-1.2 2.5-1.2-2.5z" fill="currentColor" stroke="currentColor" stroke-width="0.5"/>
</svg>
