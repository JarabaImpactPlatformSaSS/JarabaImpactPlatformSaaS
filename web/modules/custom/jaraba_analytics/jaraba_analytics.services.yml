services:
  jaraba_analytics.analytics_service:
    class: Drupal\jaraba_analytics\Service\AnalyticsService
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@current_user'
      - '@request_stack'
      - '@cache.default'
      - '@logger.channel.jaraba_analytics'
      - '@?ecosistema_jaraba_core.tenant_context'

  jaraba_analytics.analytics_aggregator:
    class: Drupal\jaraba_analytics\Service\AnalyticsAggregatorService
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@cache.default'
      - '@logger.channel.jaraba_analytics'

  jaraba_analytics.funnel_tracking:
    class: Drupal\jaraba_analytics\Service\FunnelTrackingService
    arguments:
      - '@entity_type.manager'
      - '@database'

  jaraba_analytics.cohort_analysis:
    class: Drupal\jaraba_analytics\Service\CohortAnalysisService
    arguments:
      - '@entity_type.manager'
      - '@database'

  jaraba_analytics.consent:
    class: Drupal\jaraba_analytics\Service\ConsentService
    arguments:
      - '@entity_type.manager'
      - '@request_stack'
      - '@current_user'

  logger.channel.jaraba_analytics:
    class: Drupal\Core\Logger\LoggerChannel
    factory: logger.factory:get
    arguments: ['jaraba_analytics']

  jaraba_analytics.report_execution:
    class: Drupal\jaraba_analytics\Service\ReportExecutionService
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.channel.jaraba_analytics'
      - '@plugin.manager.mail'

  jaraba_analytics.dashboard_manager:
    class: Drupal\jaraba_analytics\Service\DashboardManagerService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_analytics'

  jaraba_analytics.report_scheduler:
    class: Drupal\jaraba_analytics\Service\ReportSchedulerService
    arguments:
      - '@entity_type.manager'
      - '@plugin.manager.mail'
      - '@logger.channel.jaraba_analytics'

  jaraba_analytics.analytics_data:
    class: Drupal\jaraba_analytics\Service\AnalyticsDataService
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@logger.channel.jaraba_analytics'

  # F7 — Grant Tracking (Doc 182)
  jaraba_analytics.grant_tracking:
    class: Drupal\jaraba_analytics\Service\GrantTrackingService
    arguments:
      - '@logger.channel.jaraba_analytics'

  # F7 — Institutional Reports (Doc 182)
  jaraba_analytics.institutional_report:
    class: Drupal\jaraba_analytics\Service\InstitutionalReportService
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.jaraba_analytics'

  # Pre-PMF Metrics (Item 2)
  jaraba_analytics.activation_tracking:
    class: Drupal\jaraba_analytics\Service\ActivationTrackingService
    arguments:
      - '@entity_type.manager'
      - '@config.factory'

  jaraba_analytics.retention_calculator:
    class: Drupal\jaraba_analytics\Service\RetentionCalculatorService
    arguments:
      - '@entity_type.manager'
      - '@database'

  jaraba_analytics.nps_survey:
    class: Drupal\jaraba_analytics\Service\NpsSurveyService
    arguments:
      - '@entity_type.manager'

  jaraba_analytics.kill_criteria_alert:
    class: Drupal\jaraba_analytics\Service\KillCriteriaAlertService
    arguments:
      - '@config.factory'
      - '@logger.channel.jaraba_analytics'

  jaraba_analytics.product_metrics_aggregator:
    class: Drupal\jaraba_analytics\Service\ProductMetricsAggregatorService
    arguments:
      - '@jaraba_analytics.activation_tracking'
      - '@jaraba_analytics.retention_calculator'
      - '@jaraba_analytics.nps_survey'
      - '@jaraba_analytics.kill_criteria_alert'
      - '@entity_type.manager'

