# AUDIT-CONS-N16: Config schema for jaraba_analytics.
jaraba_analytics.settings:
  type: config_object
  label: 'Analytics settings'
  mapping:
    enable_tracking:
      type: boolean
      label: 'Enable analytics tracking'
    track_page_views:
      type: boolean
      label: 'Track page views'
    track_ecommerce:
      type: boolean
      label: 'Track e-commerce events'
    event_retention_days:
      type: integer
      label: 'Event retention days'
    daily_retention_days:
      type: integer
      label: 'Daily aggregation retention days'
    anonymize_ip:
      type: boolean
      label: 'Anonymize IP addresses'
    respect_dnt:
      type: boolean
      label: 'Respect Do Not Track header'
    cookie_consent_required:
      type: boolean
      label: 'Require cookie consent before tracking'
    cache_ttl:
      type: integer
      label: 'Cache TTL in seconds'

# Schema for ActivationCriteriaConfig entity.
jaraba_analytics.activation_criteria.*:
  type: config_entity
  label: 'Activation Criteria configuration'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
    uuid:
      type: string
      label: 'UUID'
    vertical:
      type: string
      label: 'Vertical machine name'
    criteria:
      type: sequence
      label: 'Activation criteria'
      sequence:
        type: mapping
        label: 'Criterion'
        mapping:
          event_type:
            type: string
            label: 'Event type'
          min_count:
            type: integer
            label: 'Minimum count'
          within_days:
            type: integer
            label: 'Within days'
    activation_threshold:
      type: float
      label: 'Activation threshold (0-1)'
    retention_d30_threshold:
      type: float
      label: 'Retention D30 threshold (0-1)'
    nps_threshold:
      type: integer
      label: 'NPS threshold (-100 to 100)'
    churn_threshold:
      type: float
      label: 'Churn threshold (0-1)'

# Schema for FunnelDefinition config entity.
jaraba_analytics.funnel_definition.*:
  type: config_entity
  label: 'Funnel Definition configuration'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
    uuid:
      type: string
      label: 'UUID'
    vertical:
      type: string
      label: 'Vertical machine name'
    steps:
      type: sequence
      label: 'Funnel steps'
      sequence:
        type: mapping
        label: 'Step'
        mapping:
          key:
            type: string
            label: 'Step key'
          label:
            type: string
            label: 'Step label'
          event:
            type: string
            label: 'Event type'
    conversion_window_hours:
      type: integer
      label: 'Conversion window in hours'
    is_active:
      type: boolean
      label: 'Is active'
