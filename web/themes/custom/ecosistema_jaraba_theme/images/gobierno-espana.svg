<svg xmlns="http://www.w3.org/2000/svg" width="220" height="60" viewBox="0 0 220 60" fill="none">
  <!-- Gobierno de España - Logotipo institucional -->
  <!-- Escudo simplificado con bandera -->
  <rect x="0" y="5" width="50" height="50" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Bandera española -->
  <rect x="5" y="10" width="40" height="10" fill="#C60B1E"/>
  <rect x="5" y="20" width="40" height="20" fill="#FFC400"/>
  <rect x="5" y="40" width="40" height="10" fill="#C60B1E"/>
  <!-- Escudo central simplificado -->
  <rect x="18" y="18" width="14" height="16" rx="2" fill="#C60B1E" stroke="#FFC400" stroke-width="1"/>
  <circle cx="25" cy="26" r="3" fill="#FFC400"/>
  <text x="60" y="22" fill="#1B2A4A" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="800">Gobierno de España</text>
  <text x="60" y="36" fill="#666666" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="400">Ministerio de Asuntos Económicos</text>
  <text x="60" y="48" fill="#666666" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="400">y Transformación Digital</text>
</svg>
