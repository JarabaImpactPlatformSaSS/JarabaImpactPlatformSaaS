[PHP]
; Memory limit
memory_limit = 512M

; Upload limits
upload_max_filesize = 64M
post_max_size = 64M

; Input vars — Drupal entity forms with 460+ entity types generate many fields.
; Default 1000 truncates complex forms silently.
max_input_vars = 5000

; Execution time
max_execution_time = 300

; Error reporting
display_errors = On
error_reporting = E_ALL

; APCu — Drupal class/container/discovery cache.
; Default 32M insuficiente para 80+ custom modules y 938 servicios.
; 128M recomendado por drupal.org para sitios grandes.
apc.shm_size = 128M

; OPcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000

; Timezone
date.timezone = Europe/Madrid
